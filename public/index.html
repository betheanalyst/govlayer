<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="GovLayer — Constitutional AI-assisted governance protocol on GenLayer">
<meta name="theme-color" content="#14131A" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#FAFAF7" media="(prefers-color-scheme: light)">
<meta property="og:title" content="GovLayer — Constitutional Governance">
<meta property="og:description" content="AI-assisted governance protocol. Propose, vote, and govern with constitutional oversight.">
<title>GovLayer — Constitutional Governance</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..400&family=DM+Sans:ital,opsz,wght@0,9..40,300..500;1,9..40,300..400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════════════════════
   GOVLAYER DESIGN TOKENS
   ══════════════════════════════════════════════════════════ */
:root {
  /* Ink ramp */
  --ink-950: #14131A; --ink-900: #211F2B; --ink-700: #42404F;
  --ink-500: #6B6878; --ink-400: #908DA0; --ink-300: #C4C2CF;
  --ink-200: #E0DFE8; --ink-100: #F0EFF5;

  /* Parchment surface */
  --surface: #FAFAF7; --surface-card: #F3F2EE;
  --surface-hover: #EDECEA; --surface-border: #DDD9D1;

  /* Violet accent */
  --violet-700: #3930A8; --violet-600: #4F43D4; --violet-500: #6558E8;
  --violet-400: #8F84F0; --violet-200: #C8C3FA; --violet-100: #E8E6FD;
  --violet-50: #F3F1FE;

  /* Status tokens */
  --s-pending-bg: #ECEAFD; --s-pending-text: #3930A8; --s-pending-border: #B8B1F5; --s-pending-dot: #6558E8;
  --s-revision-bg: #FDF2E4; --s-revision-text: #8A4A08; --s-revision-border: #EFC07A; --s-revision-dot: #C97B2A;
  --s-accepted-bg: #E4F5EE; --s-accepted-text: #175239; --s-accepted-border: #7DCBA3; --s-accepted-dot: #1E7A52;
  --s-rejected-bg: #FCE8E8; --s-rejected-text: #8A1A1A; --s-rejected-border: #E89A9A; --s-rejected-dot: #C23B3B;
  --s-review-bg: #E4EEF9; --s-review-text: #1A4A85; --s-review-border: #85B5E8; --s-review-dot: #3B7DD8;
  --s-confirm-bg: #F0E8FB; --s-confirm-text: #4E2280; --s-confirm-border: #BF98E0; --s-confirm-dot: #7A4FA8;
  --s-cancelled-bg: #F0EFF5; --s-cancelled-text: #6B6878; --s-cancelled-border: #C4C2CF; --s-cancelled-dot: #908DA0;

  /* Semantic */
  --text-primary: var(--ink-950); --text-secondary: var(--ink-500);
  --text-tertiary: var(--ink-400); --text-info: var(--violet-600);
  --border: var(--surface-border); --border-subtle: var(--ink-100);

  /* Typography */
  --font-display: 'Fraunces', Georgia, serif;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;

  /* Motion */
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
  --ease-out: cubic-bezier(.16,1,.3,1);
  --dur-fast: 100ms; --dur-base: 200ms; --dur-slow: 350ms;

  /* Layout */
  --nav-h: 56px; --tab-h: 60px;
  --max-w: 1160px; --sidebar-w: 300px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --surface: #0E0D12; --surface-card: #18171E;
    --surface-hover: #201F28; --surface-border: #2C2A36;
    --text-primary: #E8E6F0; --text-secondary: #9B98A8;
    --text-tertiary: #6B6878; --border: #2C2A36; --border-subtle: #201F28;
    --s-pending-bg: #1A1848; --s-pending-text: #BAB2F7; --s-pending-border: #3B3480;
    --s-revision-bg: #2A1A08; --s-revision-text: #E0A860; --s-revision-border: #5C3A10;
    --s-accepted-bg: #0A2218; --s-accepted-text: #5EC898; --s-accepted-border: #174D35;
    --s-rejected-bg: #2A0A0A; --s-rejected-text: #E88888; --s-rejected-border: #5A1818;
    --s-review-bg: #0A1E35; --s-review-text: #78AEED; --s-review-border: #1A4070;
    --s-confirm-bg: #1E0A38; --s-confirm-text: #C098E8; --s-confirm-border: #4A1878;
    --s-cancelled-bg: #18171E; --s-cancelled-text: #6B6878; --s-cancelled-border: #2C2A36;
    --violet-50: #1A1848; --violet-100: #221B58; --violet-200: #3B3480;
  }
}

/* ══════════════════════════════════════════════════════════
   RESET & BASE
   ══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: var(--font-sans); font-size: 14px; line-height: 1.5;
  color: var(--text-primary); background: var(--surface);
  min-height: 100dvh; -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; }

/* ══════════════════════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════════════════════ */
.app { display: flex; flex-direction: column; min-height: 100dvh; }
.page-body { flex: 1; padding-bottom: calc(var(--tab-h) + 16px); }
@media (min-width: 768px) { .page-body { padding-bottom: 48px; } }
.container { width: 100%; max-width: var(--max-w); margin: 0 auto; padding: 0 16px; }
@media (min-width: 768px) { .container { padding: 0 24px; } }
@media (min-width: 1024px) { .container { padding: 0 32px; } }

/* ══════════════════════════════════════════════════════════
   NAVIGATION
   ══════════════════════════════════════════════════════════ */
.nav {
  height: var(--nav-h); border-bottom: .5px solid var(--border);
  background: var(--surface); position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  display: none;
}
@media (min-width: 768px) { .nav { display: flex; align-items: center; } }
.nav-inner { display: flex; align-items: center; gap: 0; width: 100%; max-width: var(--max-w); margin: 0 auto; padding: 0 24px; height: 100%; }
.nav-logo { display: flex; align-items: center; gap: 9px; margin-right: 4px; padding-right: 20px; border-right: .5px solid var(--border); cursor: pointer; flex-shrink: 0; }
.nav-logo-mark { width: 26px; height: 26px; background: var(--violet-500); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0; }
.nav-logo-text { font-family: var(--font-display); font-size: 15px; font-weight: 400; color: var(--text-primary); letter-spacing: -.01em; }
.nav-links { display: flex; align-items: stretch; height: 100%; }
.nav-link { display: flex; align-items: center; padding: 0 14px; font-size: 13px; font-weight: 400; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: color var(--dur-fast), border-color var(--dur-fast); cursor: pointer; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; }
.nav-link:hover { color: var(--text-primary); }
.nav-link.active { color: var(--text-primary); border-bottom-color: var(--violet-500); font-weight: 500; }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.eligibility-chip { padding: 4px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; border: .5px solid; cursor: default; white-space: nowrap; }
.admin-chip { background: var(--s-confirm-bg); color: var(--s-confirm-text); border: .5px solid var(--s-confirm-border); padding: 4px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: opacity var(--dur-fast); white-space: nowrap; }
.admin-chip:hover { opacity: .8; }
.wallet-btn { padding: 6px 14px; border-radius: 7px; font-family: var(--font-mono); font-size: 12px; font-weight: 500; border: .5px solid var(--border); background: var(--surface-card); color: var(--text-secondary); transition: all var(--dur-fast); cursor: pointer; white-space: nowrap; }
.wallet-btn:hover { background: var(--surface-hover); color: var(--text-primary); }
.wallet-btn.connected { color: var(--text-info); border-color: var(--violet-200); background: var(--violet-50); }

/* Mobile header */
.mobile-header { height: 52px; display: flex; align-items: center; padding: 0 16px; border-bottom: .5px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
@media (min-width: 768px) { .mobile-header { display: none; } }
.mobile-logo { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-size: 15px; font-weight: 400; color: var(--text-primary); }
.mobile-actions { margin-left: auto; display: flex; align-items: center; gap: 6px; }

/* Tab bar */
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--tab-h); background: var(--surface); border-top: .5px solid var(--border); display: flex; z-index: 200; padding-bottom: env(safe-area-inset-bottom); }
@media (min-width: 768px) { .tab-bar { display: none; } }
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; transition: color var(--dur-fast); color: var(--text-tertiary); font-size: 10px; font-weight: 500; letter-spacing: .02em; -webkit-tap-highlight-color: transparent; padding: 8px 4px; background: none; border: none; }
.tab-item.active { color: var(--violet-600); }
.tab-item svg { width: 22px; height: 22px; flex-shrink: 0; }
.tab-icon-wrap { position: relative; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
.tab-badge { position: absolute; top: -2px; right: -4px; width: 14px; height: 14px; background: var(--s-confirm-dot); border-radius: 50%; font-size: 8px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--surface); }

/* ══════════════════════════════════════════════════════════
   ACTION BANNER
   ══════════════════════════════════════════════════════════ */
.action-banner { background: var(--violet-50); border-bottom: .5px solid var(--violet-100); padding: 10px 0; }
.action-banner-inner { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.action-banner-text { flex: 1; color: var(--text-info); }
.btn-banner { padding: 5px 14px; background: var(--violet-500); color: #fff; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: opacity var(--dur-fast); flex-shrink: 0; }
.btn-banner:hover { opacity: .88; }

/* ══════════════════════════════════════════════════════════
   PAGE HEADER
   ══════════════════════════════════════════════════════════ */
.page-header { padding: 24px 0 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
@media (min-width: 768px) { .page-header { padding: 32px 0 24px; } }
.page-title { font-family: var(--font-display); font-size: 26px; font-weight: 350; letter-spacing: -.025em; line-height: 1.1; }
@media (min-width: 768px) { .page-title { font-size: 32px; } }
.page-header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-row { display: flex; gap: 2px; background: var(--surface-card); border: .5px solid var(--border); border-radius: 7px; padding: 3px; }
.filter-btn { padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: 500; color: var(--text-secondary); background: transparent; border: none; cursor: pointer; transition: all var(--dur-fast); white-space: nowrap; }
.filter-btn:hover { color: var(--text-primary); }
.filter-btn.active { background: var(--surface); color: var(--text-primary); border: .5px solid var(--border); box-shadow: 0 1px 2px rgba(0,0,0,.06); }

/* ══════════════════════════════════════════════════════════
   FEED LAYOUT
   ══════════════════════════════════════════════════════════ */
.feed-layout { display: grid; grid-template-columns: 1fr; gap: 16px; align-items: start; }
@media (min-width: 900px) { .feed-layout { grid-template-columns: 1fr var(--sidebar-w); } }
.feed-list { display: flex; flex-direction: column; gap: 8px; }

/* ══════════════════════════════════════════════════════════
   STATUS BADGE
   ══════════════════════════════════════════════════════════ */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; letter-spacing: .01em; border: .5px solid transparent; flex-shrink: 0; white-space: nowrap; }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.badge.pending { background: var(--s-pending-bg); color: var(--s-pending-text); border-color: var(--s-pending-border); }
.badge.pending .badge-dot { background: var(--s-pending-dot); animation: pulse-dot 2s ease-in-out infinite; }
.badge.needs_revision { background: var(--s-revision-bg); color: var(--s-revision-text); border-color: var(--s-revision-border); }
.badge.needs_revision .badge-dot { background: var(--s-revision-dot); animation: pulse-dot 2s ease-in-out infinite; }
.badge.accepted { background: var(--s-accepted-bg); color: var(--s-accepted-text); border-color: var(--s-accepted-border); }
.badge.accepted .badge-dot { background: var(--s-accepted-dot); }
.badge.rejected { background: var(--s-rejected-bg); color: var(--s-rejected-text); border-color: var(--s-rejected-border); }
.badge.rejected .badge-dot { background: var(--s-rejected-dot); }
.badge.under_review { background: var(--s-review-bg); color: var(--s-review-text); border-color: var(--s-review-border); }
.badge.under_review .badge-dot { background: var(--s-review-dot); animation: pulse-dot 1.4s ease-in-out infinite; }
.badge.pending_constitution_confirm { background: var(--s-confirm-bg); color: var(--s-confirm-text); border-color: var(--s-confirm-border); }
.badge.pending_constitution_confirm .badge-dot { background: var(--s-confirm-dot); animation: pulse-dot 2s ease-in-out infinite; }
.badge.cancelled { background: var(--s-cancelled-bg); color: var(--s-cancelled-text); border-color: var(--s-cancelled-border); }
.badge.cancelled .badge-dot { background: var(--s-cancelled-dot); }
.badge.constitution-type { background: var(--ink-900); color: var(--violet-200); border-color: var(--violet-700); font-size: 10px; }
@keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

/* ══════════════════════════════════════════════════════════
   COUNTDOWN TIMER
   ══════════════════════════════════════════════════════════ */
.timer { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 6px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; border: .5px solid var(--s-pending-border); background: var(--s-pending-bg); color: var(--s-pending-text); white-space: nowrap; flex-shrink: 0; }
.timer.urgent { border-color: var(--s-revision-border); background: var(--s-revision-bg); color: var(--s-revision-text); animation: timer-pulse 1.5s ease-in-out infinite; }
.timer.closed { background: var(--surface-card); border-color: var(--border); color: var(--text-tertiary); }
.timer.finalize-ready { background: var(--s-revision-bg); border-color: var(--s-revision-border); color: var(--s-revision-text); }
.timer.cooldown { border-color: var(--s-revision-border); background: var(--s-revision-bg); color: var(--s-revision-text); }
@keyframes timer-pulse { 0%,100% { opacity: 1; } 50% { opacity: .7; } }

/* ══════════════════════════════════════════════════════════
   VOTE BAR
   ══════════════════════════════════════════════════════════ */
.vote-track { height: 7px; background: var(--surface-card); border-radius: 9999px; overflow: visible; border: .5px solid var(--border); position: relative; }
.vote-yes { position: absolute; left: 0; top: 0; bottom: 0; background: var(--s-accepted-dot); border-radius: 9999px 0 0 9999px; transition: width var(--dur-slow) var(--ease-out); }
.vote-no { position: absolute; right: 0; top: 0; bottom: 0; background: var(--s-rejected-dot); border-radius: 0 9999px 9999px 0; transition: width var(--dur-slow) var(--ease-out); }
.quorum-tick { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--violet-500); border-radius: 1px; z-index: 2; }
.vote-labels { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: 12px; }
.vote-yes-label { color: var(--s-accepted-text); font-weight: 500; }
.vote-no-label { color: var(--s-rejected-text); font-weight: 500; }
.quorum-info { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--violet-600); margin-top: 5px; }
.quorum-marker { width: 8px; height: 8px; border-radius: 2px; background: var(--violet-500); flex-shrink: 0; }

/* ══════════════════════════════════════════════════════════
   PROPOSAL CARD
   ══════════════════════════════════════════════════════════ */
.proposal-card { background: var(--surface-card); border: .5px solid var(--border); border-radius: 10px; padding: 16px; cursor: pointer; transition: border-color var(--dur-fast), background var(--dur-fast), transform var(--dur-fast); animation: card-enter var(--dur-slow) var(--ease-out) both; -webkit-tap-highlight-color: transparent; }
.proposal-card:hover { border-color: var(--ink-300); background: var(--surface); transform: translateY(-1px); }
.proposal-card.selected { border-color: var(--violet-400); background: var(--surface); }
@keyframes card-enter { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.card-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
.card-title { font-size: 14px; font-weight: 500; color: var(--text-primary); line-height: 1.35; flex: 1; }
.card-meta { font-size: 11px; color: var(--text-tertiary); display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; font-family: var(--font-mono); }
.card-bottom { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.ai-chip { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-tertiary); }
.ai-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.card-cta { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--violet-50); border: .5px solid var(--violet-100); border-radius: 6px; font-size: 11px; font-weight: 500; color: var(--violet-600); transition: background var(--dur-fast); flex-shrink: 0; }
.card-cta:hover { background: var(--violet-100); }
.mini-bar-wrap { height: 4px; border-radius: 9999px; background: var(--surface-hover); overflow: hidden; position: relative; margin-bottom: 8px; border: .5px solid var(--border); }
.mini-bar-yes { height: 100%; background: var(--s-accepted-dot); border-radius: 9999px 0 0 9999px; position: absolute; left: 0; top: 0; transition: width .6s var(--ease-out); }
.mini-bar-no { height: 100%; background: var(--s-rejected-dot); border-radius: 0 9999px 9999px 0; position: absolute; right: 0; top: 0; transition: width .6s var(--ease-out); }

/* ══════════════════════════════════════════════════════════
   SIDEBAR / PANELS
   ══════════════════════════════════════════════════════════ */
.sidebar { display: flex; flex-direction: column; gap: 10px; }
.sidebar-card { background: var(--surface-card); border: .5px solid var(--border); border-radius: 10px; overflow: hidden; }
.sidebar-section { padding: 14px 16px; border-bottom: .5px solid var(--border); }
.sidebar-section:last-child { border-bottom: none; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.stat-cell { background: var(--surface); border: .5px solid var(--border); border-radius: 7px; padding: 10px 12px; }
.stat-val { font-size: 20px; font-weight: 500; color: var(--text-primary); line-height: 1; font-family: var(--font-display); }
.stat-key { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }
.roster-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: .5px solid var(--border); }
.roster-row:last-child { border-bottom: none; }
.avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.history-entry { padding: 8px 0; border-bottom: .5px solid var(--border); }
.history-entry:last-child { border-bottom: none; }
.log-ts { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 2px; }

/* ══════════════════════════════════════════════════════════
   AI AUDIT PANEL
   ══════════════════════════════════════════════════════════ */
.audit-panel { background: var(--surface-card); border: .5px solid var(--border); border-radius: 10px; overflow: hidden; }
.audit-header { padding: 12px 16px; border-bottom: .5px solid var(--border); display: flex; align-items: center; gap: 10px; }
.audit-icon { width: 22px; height: 22px; background: var(--violet-500); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 8px; font-weight: 700; color: #fff; flex-shrink: 0; }
.audit-source-title { font-size: 12px; font-weight: 500; color: var(--text-primary); }
.audit-source-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
.verdict-chip { padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; border: .5px solid; flex-shrink: 0; }
.verdict-accept { background: var(--s-accepted-bg); color: var(--s-accepted-text); border-color: var(--s-accepted-border); }
.verdict-revise { background: var(--s-revision-bg); color: var(--s-revision-text); border-color: var(--s-revision-border); }
.verdict-reject { background: var(--s-rejected-bg); color: var(--s-rejected-text); border-color: var(--s-rejected-border); }
.audit-body { padding: 14px 16px; }
.audit-reasoning { font-size: 13px; line-height: 1.65; color: var(--text-primary); margin-bottom: 14px; }
.conflict-list { display: flex; flex-direction: column; gap: 7px; }
.conflict-item { border: .5px solid var(--s-revision-border); background: var(--s-revision-bg); border-radius: 7px; padding: 9px 12px; }
.conflict-clause { font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--s-revision-text); margin-bottom: 3px; }
.conflict-text { font-size: 12px; color: var(--s-revision-text); line-height: 1.5; opacity: .85; }
.audit-expand { width: 100%; padding: 9px 16px; text-align: left; font-size: 12px; color: var(--text-tertiary); border-top: .5px solid var(--border); background: transparent; cursor: pointer; transition: color var(--dur-fast), background var(--dur-fast); display: flex; align-items: center; gap: 4px; }
.audit-expand:hover { color: var(--text-primary); background: var(--surface-hover); }

/* ══════════════════════════════════════════════════════════
   DETAIL LAYOUT
   ══════════════════════════════════════════════════════════ */
.detail-layout { display: grid; grid-template-columns: 1fr; gap: 16px; align-items: start; }
@media (min-width: 860px) { .detail-layout { grid-template-columns: 1fr 280px; } }
.detail-main { display: flex; flex-direction: column; gap: 16px; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); padding: 5px 10px; border: .5px solid var(--border); border-radius: 6px; background: var(--surface-card); cursor: pointer; transition: all var(--dur-fast); margin-bottom: 16px; }
.back-link:hover { color: var(--text-primary); border-color: var(--ink-300); }
.prop-meta-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 10px; }
.prop-num { font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary); }
.prop-detail-title { font-family: var(--font-display); font-size: 22px; font-weight: 350; letter-spacing: -.02em; line-height: 1.2; margin-bottom: 8px; }
@media (min-width: 768px) { .prop-detail-title { font-size: 27px; } }
.prop-submeta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--text-tertiary); font-family: var(--font-mono); }
.content-card { background: var(--surface-card); border: .5px solid var(--border); border-radius: 10px; padding: 16px; }
.prop-description { font-size: 14px; line-height: 1.7; color: var(--text-primary); }
.vote-yes-label { color: var(--s-accepted-text); font-weight: 500; }
.vote-no-label { color: var(--s-rejected-text); font-weight: 500; }
.vote-buttons { display: flex; gap: 8px; margin-top: 6px; }
.btn-vote-for { flex: 1; padding: 10px 16px; background: var(--s-accepted-dot); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity var(--dur-fast), transform var(--dur-fast); }
.btn-vote-for:hover { opacity: .88; transform: translateY(-1px); }
.btn-vote-against { flex: 1; padding: 10px 16px; background: var(--surface); border: .5px solid var(--border); color: var(--text-primary); border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--dur-fast); }
.btn-vote-against:hover { background: var(--s-rejected-bg); border-color: var(--s-rejected-border); color: var(--s-rejected-text); }
.already-voted-msg { display: flex; align-items: center; gap: 7px; padding: 10px 14px; background: var(--surface); border: .5px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
.voted-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Dispute timeline */
.dispute-timeline { display: flex; flex-direction: column; }
.dispute-stage { display: flex; gap: 12px; }
.stage-line-col { display: flex; flex-direction: column; align-items: center; }
.stage-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
.stage-connector { width: 1px; flex: 1; min-height: 24px; background: var(--border); margin: 3px 0; }
.stage-content { flex: 1; padding-bottom: 20px; }
.stage-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; color: var(--text-tertiary); margin-bottom: 4px; }
.stage-reason { font-size: 13px; color: var(--text-primary); margin-bottom: 4px; line-height: 1.5; }
.stage-resolution { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.stage-ts { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); margin-top: 4px; }

/* Diff */
.diff-wrap { border: .5px solid var(--border); border-radius: 8px; overflow: hidden; font-family: var(--font-mono); font-size: 12px; }
.diff-header { padding: 8px 14px; background: var(--surface-card); border-bottom: .5px solid var(--border); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--text-tertiary); display: flex; justify-content: space-between; }
.diff-line { padding: 5px 14px; line-height: 1.5; }
.diff-same { color: var(--text-secondary); }
.diff-removed { background: var(--s-rejected-bg); color: var(--s-rejected-text); text-decoration: line-through; }
.diff-added { background: var(--s-accepted-bg); color: var(--s-accepted-text); }
.diff-marker { font-size: 10px; margin-right: 6px; opacity: .7; }

/* ══════════════════════════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════════════════════════ */
.btn-primary { padding: 9px 18px; background: var(--violet-500); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity var(--dur-fast), transform var(--dur-fast); display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.btn-primary:hover { opacity: .88; }
.btn-primary:active { transform: scale(.98); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.btn-primary.full-w { width: 100%; }
.btn-secondary { padding: 9px 18px; background: var(--surface); border: .5px solid var(--border); color: var(--text-primary); border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--dur-fast); display: inline-flex; align-items: center; gap: 6px; }
.btn-secondary:hover { background: var(--surface-hover); border-color: var(--ink-300); }
.btn-secondary.full-w { width: 100%; justify-content: center; }
.btn-danger { padding: 9px 18px; background: var(--surface); border: .5px solid var(--s-rejected-border); color: var(--s-rejected-text); border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--dur-fast); display: inline-flex; align-items: center; gap: 6px; }
.btn-danger:hover { background: var(--s-rejected-bg); }
.btn-danger.full-w { width: 100%; justify-content: center; }

/* ══════════════════════════════════════════════════════════
   FORMS
   ══════════════════════════════════════════════════════════ */
.form-card { background: var(--surface-card); border: .5px solid var(--border); border-radius: 10px; overflow: hidden; }
.form-section { padding: 16px 18px; border-bottom: .5px solid var(--border); }
.form-section:last-child { border-bottom: none; }
.field { margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }
.field-label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
.field-hint { font-size: 11px; color: var(--text-tertiary); font-weight: 400; }
.field-input { width: 100%; padding: 9px 12px; border: .5px solid var(--border); border-radius: 7px; font-size: 14px; color: var(--text-primary); background: var(--surface); outline: none; transition: border-color var(--dur-fast), box-shadow var(--dur-fast); resize: vertical; }
.field-input:focus { border-color: var(--violet-400); box-shadow: 0 0 0 3px rgba(101,88,232,.12); }
.char-count-wrap { position: relative; }
.char-count { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); pointer-events: none; }
.type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.type-opt { padding: 12px; border: .5px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--surface); transition: all var(--dur-fast); text-align: left; }
.type-opt:hover { border-color: var(--ink-300); background: var(--surface-hover); }
.type-opt.selected { border-color: var(--violet-400); background: var(--violet-50); }
.type-opt-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 3px; }
.type-opt-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
.type-opt.selected .type-opt-title { color: var(--text-info); }
.duration-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.dur-chip { padding: 5px 14px; border: .5px solid var(--border); border-radius: 9999px; font-size: 12px; font-weight: 500; color: var(--text-secondary); background: var(--surface); cursor: pointer; transition: all var(--dur-fast); }
.dur-chip:hover { border-color: var(--ink-300); color: var(--text-primary); }
.dur-chip.selected { background: var(--violet-50); border-color: var(--violet-200); color: var(--violet-600); }
.constitution-hint { margin-top: 10px; padding: 10px 14px; background: var(--violet-50); border: .5px solid var(--violet-100); border-radius: 7px; cursor: pointer; transition: background var(--dur-fast); }
.constitution-hint:hover { background: var(--violet-100); }
.hint-label { font-size: 11px; font-weight: 500; color: var(--text-info); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
.hint-quote { font-size: 12px; color: var(--text-info); font-style: italic; line-height: 1.5; opacity: .85; }
.form-note { font-size: 11px; color: var(--text-tertiary); text-align: center; margin-top: 6px; }
.revision-panel { background: var(--s-revision-bg); border: .5px solid var(--s-revision-border); border-radius: 10px; overflow: hidden; }
.revision-header { padding: 12px 16px; border-bottom: .5px solid var(--s-revision-border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.revision-title { font-size: 13px; font-weight: 500; color: var(--s-revision-text); display: flex; align-items: center; gap: 7px; }
.revision-icon { width: 18px; height: 18px; border-radius: 50%; background: var(--s-revision-dot); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.revision-count-chip { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 9999px; background: rgba(0,0,0,.08); color: var(--s-revision-text); }
.revision-body { padding: 14px 16px; }
.checklist-item { display: flex; gap: 10px; align-items: flex-start; padding-bottom: 12px; margin-bottom: 12px; border-bottom: .5px solid var(--s-revision-border); }
.checklist-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.check-num { width: 20px; height: 20px; border-radius: 50%; background: var(--s-revision-dot); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.check-clause { font-size: 11px; font-weight: 500; color: var(--s-revision-text); font-family: var(--font-mono); margin-bottom: 3px; }
.check-issue { font-size: 12px; color: var(--s-revision-text); line-height: 1.55; opacity: .85; }

/* ══════════════════════════════════════════════════════════
   LOADING / ERROR / EMPTY STATES
   ══════════════════════════════════════════════════════════ */
.empty-state { text-align: center; padding: 56px 24px; background: var(--surface-card); border: .5px solid var(--border); border-radius: 10px; }
.empty-icon { width: 52px; height: 52px; background: var(--violet-50); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 16px; }
.empty-title { font-family: var(--font-display); font-size: 18px; font-weight: 350; color: var(--text-primary); margin-bottom: 8px; }
.empty-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.6; max-width: 320px; margin: 0 auto 20px; }
.skeleton-card { background: var(--surface-card); border: .5px solid var(--border); border-radius: 10px; padding: 16px; animation: skel-pulse 1.6s ease-in-out infinite; }
@keyframes skel-pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
.sk-line { height: 12px; background: var(--surface-hover); border-radius: 3px; margin-bottom: 8px; }
.sk-badge { height: 22px; width: 90px; background: var(--surface-hover); border-radius: 9999px; margin-bottom: 10px; }
.sk-bar { height: 4px; background: var(--surface-hover); border-radius: 9999px; margin: 10px 0; }
.error-banner { background: var(--s-rejected-bg); border: .5px solid var(--s-rejected-border); border-radius: 8px; padding: 14px 16px; display: flex; gap: 10px; font-size: 13px; }
.error-title { font-weight: 500; color: var(--s-rejected-text); margin-bottom: 3px; }
.error-msg { font-size: 12px; color: var(--s-rejected-text); line-height: 1.5; margin-bottom: 8px; opacity: .85; }
.error-retry { font-size: 12px; color: var(--s-rejected-dot); font-weight: 500; background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }
.network-banner { background: var(--s-review-bg); border: .5px solid var(--s-review-border); border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--s-review-text); margin-bottom: 16px; }

/* ══════════════════════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════════════════════ */
.toast-container { position: fixed; bottom: calc(var(--tab-h) + 12px); right: 16px; left: 16px; z-index: 300; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
@media (min-width: 768px) { .toast-container { bottom: 24px; left: auto; width: 340px; } }
.toast { background: var(--surface); border: .5px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.12); pointer-events: all; animation: toast-enter var(--dur-slow) var(--ease-out) both; }
@keyframes toast-enter { from { opacity: 0; transform: translateY(10px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
.toast.leaving { animation: toast-leave var(--dur-base) var(--ease-out) both; }
@keyframes toast-leave { to { opacity: 0; transform: translateY(6px) scale(.97); } }
.toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.toast-spinner { width: 10px; height: 10px; border: 1.5px solid var(--violet-200); border-top-color: var(--violet-500); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast-info { flex: 1; }
.toast-label { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.toast-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; font-family: var(--font-mono); }
.toast-dismiss { font-size: 16px; color: var(--text-tertiary); cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: color var(--dur-fast); border: none; background: none; }
.toast-dismiss:hover { color: var(--text-primary); }

/* ══════════════════════════════════════════════════════════
   CONSTITUTION
   ══════════════════════════════════════════════════════════ */
.const-article { margin-bottom: 32px; }
.const-article-title { font-family: var(--font-display); font-size: 17px; font-weight: 400; color: var(--text-primary); margin-bottom: 16px; padding-bottom: 10px; border-bottom: .5px solid var(--border); }
.const-clause { margin-bottom: 20px; }
.const-clause-num { font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--text-info); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
.const-clause-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
.const-clause-text { font-size: 13px; line-height: 1.7; color: var(--text-secondary); border-left: 2px solid var(--violet-200); padding-left: 12px; }

/* Admin */
.admin-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 768px) { .admin-grid { grid-template-columns: 1fr 1fr; } }
.admin-card { background: var(--surface-card); border: .5px solid var(--border); border-radius: 10px; overflow: hidden; }
.admin-card-header { padding: 12px 16px; border-bottom: .5px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.admin-card-title { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.admin-card-body { padding: 14px 16px; }
.param-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 7px 0; border-bottom: .5px solid var(--border); font-size: 13px; }
.param-row:last-child { border-bottom: none; }
.param-key { color: var(--text-secondary); }
.param-val { font-weight: 500; color: var(--text-primary); }
.multisig-action-card { background: var(--surface); border: .5px solid var(--s-confirm-border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.multisig-action-card:last-child { margin-bottom: 0; }

/* ══════════════════════════════════════════════════════════
   UTILITIES
   ══════════════════════════════════════════════════════════ */
.hidden { display: none !important; }
.t-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; color: var(--text-tertiary); }
.t-mono { font-family: var(--font-mono); font-size: 12px; }
.t-small { font-size: 12px; color: var(--text-secondary); }
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.connect-prompt { border: .5px dashed var(--border); border-radius: 8px; padding: 14px 16px; text-align: center; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

/* ══════════════════════════════════════════════════════════
   GOVERNANCE IDENTITY — constitutional authority signatures
   ══════════════════════════════════════════════════════════ */

/* Proposal number — treated as a legal docket number */
.docket {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
  letter-spacing: .06em;
  text-transform: uppercase;
}

/* Ruling line — thin horizontal rule with civic weight */
.ruling-line {
  border: none;
  border-top: 1px solid var(--border);
  margin: 0;
  opacity: .6;
}

/* Seal — the governance process indicator strip */
.process-strip {
  display: flex;
  align-items: center;
  gap: 0;
  font-size: 11px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  letter-spacing: .04em;
  overflow-x: auto;
  padding: 10px 16px;
  background: var(--surface-card);
  border-bottom: .5px solid var(--border);
  scrollbar-width: none;
}
.process-strip::-webkit-scrollbar { display: none; }

.process-step {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  padding: 3px 8px;
  border-radius: 4px;
}
.process-step.done   { color: var(--s-accepted-text); }
.process-step.active { color: var(--text-primary); font-weight: 500; background: var(--surface-hover); }
.process-step.future { opacity: .45; }

.process-arrow {
  color: var(--text-tertiary);
  padding: 0 2px;
  font-size: 10px;
  flex-shrink: 0;
}

/* Constitution quote block — pulls a clause into focus */
.const-pullquote {
  border-left: 3px solid var(--violet-400);
  padding: 10px 16px;
  margin: 0;
  background: var(--violet-50);
  border-radius: 0 7px 7px 0;
}
.const-pullquote p {
  font-family: var(--font-display);
  font-size: 14px;
  font-style: italic;
  font-weight: 350;
  color: var(--text-info);
  line-height: 1.6;
  margin: 0;
}
.const-pullquote cite {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 6px;
  font-style: normal;
}

/* Vote moment — enlarged tally for the detail page */
.vote-tally-large {
  display: flex;
  gap: 20px;
  align-items: baseline;
  margin-bottom: 12px;
}
.vote-tally-large .tally-yes {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 350;
  color: var(--s-accepted-text);
  letter-spacing: -.02em;
  line-height: 1;
}
.vote-tally-large .tally-no {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 350;
  color: var(--s-rejected-text);
  letter-spacing: -.02em;
  line-height: 1;
}
.vote-tally-large .tally-label {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-tertiary);
  margin-left: 3px;
  align-self: flex-end;
  padding-bottom: 5px;
}
.vote-tally-sep {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--border);
  align-self: flex-end;
  padding-bottom: 4px;
}

/* Finalization moment — high-stakes CTA */
.finalize-cta {
  background: var(--ink-950);
  border: none;
  color: #fff;
  border-radius: 10px;
  padding: 14px 24px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
  letter-spacing: -.01em;
  transition: opacity var(--dur-fast), transform var(--dur-fast);
  display: flex;

/* ══════════════════════════════════════════════════════════
   UTILITIES
   ══════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');

function formatAddress(addr) {
  if (!addr || addr.length < 12) return addr || '—';
  return `${addr.slice(0,6)}…${addr.slice(-4)}`;
}

function formatTimestamp(unix) {
  if (!unix || unix === 0) return '—';
  const d = new Date(unix * 1000);
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const h = String(d.getUTCHours()).padStart(2,'0');
  const min = String(d.getUTCMinutes()).padStart(2,'0');
  return `${m[d.getUTCMonth()]} ${d.getUTCDate()}, ${d.getUTCFullYear()} · ${h}:${min} UTC`;
}

function formatCountdown(unix) {
  if (!unix) return '—';
  const diff = unix - Math.floor(Date.now()/1000);
  if (diff <= 0) return 'Closed';
  if (diff < 60) return `${diff}s`;
  if (diff < 3600) return `${Math.floor(diff/60)}m`;
  if (diff < 86400) { const h=Math.floor(diff/3600),m=Math.floor((diff%3600)/60); return m>0?`${h}h ${m}m`:`${h}h`; }
  const d=Math.floor(diff/86400),h=Math.floor((diff%86400)/3600);
  return h>0?`${d}d ${h}h`:`${d}d`;
}

function formatSeconds(s) {
  s = Number(s)||0;
  if (s < 3600) return `${Math.floor(s/60)}m`;
  if (s < 86400) return `${Math.floor(s/3600)}h`;
  return `${Math.floor(s/86400)}d`;
}

function isVotingClosed(votingEnd) { return Math.floor(Date.now()/1000) > (Number(votingEnd)||0); }
function isUrgent(unix) { return unix - Math.floor(Date.now()/1000) < 60; }

/* ══════════════════════════════════════════════════════════
   ERROR MAP
   ══════════════════════════════════════════════════════════ */
const ERROR_MAP = {
  'Voting period has closed':         'Voting has closed. Click "Close voting" to record the outcome.',
  'Voting period has not yet closed': 'Voting is still open — wait for the window to close.',
  'Already voted on this proposal':   'You already voted on this proposal.',

  'Only the original proposer can cancel': 'Only the original proposer can cancel this.',
  'Maximum resubmissions':            'All revisions used. Submit a new proposal instead.',
  'The voting window has expired':    'Voting window closed. Submit a new proposal.',
  'Only admins':                      'Your wallet does not have admin privileges.',
  'Cannot add the zero address':      'Please enter a valid wallet address.',

  'Cannot approve your own':          'A different admin must approve — you proposed this.',
  'Action has expired':               'Action expired. Propose it again.',
  'Proposal is not awaiting constitution confirmation': 'This constitution update has already been applied or is not yet ready.',

};

function mapError(raw) {
  if (!raw) return 'An unexpected error occurred.';
  for (const [key, msg] of Object.entries(ERROR_MAP)) {
    if (raw.includes(key)) return msg;
  }
  return raw.length > 140 ? raw.slice(0,140)+'…' : raw;
}

/* ══════════════════════════════════════════════════════════
   GENLAYER-JS SDK CLIENT
   SDK loaded via ESM module above (top-level await), stored on window._GL.
   API: readContract  → { address, functionName, args }
        writeContract → { account, address, functionName, args, value: 0n }
        waitForTransactionReceipt → { hash, status: TransactionStatus.ACCEPTED }
   Transactions on Studionet: 1–4 min (standard); 2–5 min (AI-heavy).
   Poll loop: 72 attempts × 5s = up to 6 minutes. No double-decrement.
   ══════════════════════════════════════════════════════════ */

let _glClient = null;

/* Wait for the ESM module's top-level await to complete.
   Returns immediately if already loaded. Rejects after timeoutMs. */
function waitForSDK(timeoutMs = 15000) {
  if (window._GL) return Promise.resolve();
  if (window._GL_ERROR) return Promise.reject(new Error('SDK load failed: ' + window._GL_ERROR));
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() =>
      reject(new Error('GenLayer SDK did not load within 15s. Check your network and refresh.')), timeoutMs);
    window.addEventListener('gl-sdk-ready', (e) => {
      clearTimeout(timer);
      if (e.detail && e.detail.ok) resolve();
      else reject(new Error('SDK load failed: ' + (window._GL_ERROR || 'unknown error')));
    }, { once: true });
  });
}

function getSDK() {
  if (!window._GL) throw new Error('GenLayer SDK not loaded. Please refresh the page.');
  return window._GL;
}

function getClient() {
  if (_glClient) return _glClient;
  const { createClient } = getSDK();
  _glClient = createClient({ endpoint: CONFIG.RPC_URL });
  return _glClient;
}

async function readContract(fn, args = []) {
  const client = getClient();
  const maxAttempts = 3;
  let lastErr;
  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    try {
      return await client.readContract({
        address:      CONFIG.CONTRACT_ADDRESS,
        functionName: fn,
        args:         args,
      });
    } catch (err) {
      lastErr = err;
      const retryable = err.message && (
        err.message.includes('fetch') ||
        err.message.includes('network') ||
        err.message.includes('timeout') ||
        err.message.includes('Failed to fetch')
      );
      if (!retryable || attempt === maxAttempts - 1) throw err;
      await new Promise(r => setTimeout(r, 2000 * (attempt + 1)));
    }
  }
  throw lastErr;
}

/* ── In-flight guard — prevents duplicate write submissions ──────────────── */
const _inFlight = new Set();

async function writeContract(fn, args = []) {
  if (!state.wallet) throw new Error('Wallet not connected');
  if (!state.account)  throw new Error('Account not initialised');

  const client = getClient();
  const { TransactionStatus } = getSDK();

  // Submit the transaction
  const hash = await client.writeContract({
    account:      state.account,
    address:      CONFIG.CONTRACT_ADDRESS,
    functionName: fn,
    args:         args,
    value:        0n,
  });

  // Initial pause for RPC indexing
  await new Promise(r => setTimeout(r, 3000));

  // Poll for receipt — 72 × 5s = 6 minutes max, single-decrement, no race
  const maxAttempts = 72;
  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    try {
      const receipt = await client.waitForTransactionReceipt({
        hash,
        status: TransactionStatus.ACCEPTED,
      });
      if (receipt) return receipt;
    } catch (err) {
      const isNotReady = err.message && (
        err.message.includes('not found') ||
        err.message.includes('pending')  ||
        err.message.includes('unknown')  ||
        err.message.includes('fetch')    ||
        err.message.includes('network')  ||
        err.message.includes('timeout')  ||
        err.message.includes('failed')
      );
      // Only hard-throw on final attempt or non-retryable errors
      if (!isNotReady || attempt === maxAttempts - 1) throw err;
    }
    await new Promise(r => setTimeout(r, 5000));
  }
  throw new Error(
    'Transaction is taking longer than expected (6 min). ' +
    'Check Governance History — it may have finalized. Hash: ' + hash
  );
}

/* Progressive toast updater for long-running writes.
   Returns a cancel function to stop updates. */
function startTxProgress(tid, isAiHeavy) {
  const milestones = isAiHeavy
    ? [
        [0,    'Transaction submitted to chain…'],
        [25,   'Awaiting validator consensus…'],
        [80,   'AI evaluation running — may take 2–5 min'],
        [200,  'Validators deliberating — still in progress…'],
        [300,  'Still processing. GenLayer consensus can take up to 6 min.'],
      ]
    : [
        [0,    'Transaction submitted…'],
        [30,   'Awaiting validator consensus…'],
        [90,   'Confirming on chain — almost there…'],
        [210,  'Still in progress — GenLayer consensus can take up to 6 min.'],
      ];

  let i = 0;
  const timers = [];
  milestones.forEach(([secs, msg]) => {
    timers.push(setTimeout(() => {
      const el = document.getElementById(`toast-sub-${tid}`);
      if (el) el.textContent = msg;
    }, secs * 1000));
  });
  return () => timers.forEach(clearTimeout);
}

/* ══════════════════════════════════════════════════════════
   NETWORK CHECK
   ══════════════════════════════════════════════════════════ */
async function checkNetwork() {
  try {
    const cfg = await readContract('get_config');
    state.networkOk = true;
    return cfg;
  } catch (e) {
    state.networkOk = false;
    return null;
  }
}

/* ══════════════════════════════════════════════════════════
   LIVE DATA LOADING
   ══════════════════════════════════════════════════════════ */
async function loadConfig() {
  try {
    const cfg = await readContract('get_config');
    if (cfg) state.config = cfg;
  } catch (e) {
    console.warn('loadConfig:', e.message);
  }
}

async function loadAdmins() {
  try {
    const admins = await readContract('get_admins');
    if (Array.isArray(admins)) state.admins = admins;
  } catch (e) {
    console.warn('loadAdmins:', e.message);
  }
}

async function loadConstitution() {
  try {
    const text = await readContract('get_constitution');
    if (text) state.constitution = text;
  } catch (e) {
    console.warn('loadConstitution:', e.message);
  }
}

async function loadProposals() {
  state.loading.proposals = true;
  try {
    // contract: list_proposals is 1-based, oldest-first within the returned page.
    // To always show newest proposals: fetch the LAST page by computing offset from proposal_count.
    // If proposal_count is 0 or unknown, fall back to offset 1.
    const limit = 20;
    const total = state.config ? Number(state.config.proposal_count) : 0;
    // offset of the last page: e.g. count=25 → offset=6, fetches #6-25 (newest 20)
    const offset = total > limit ? total - limit + 1 : 1;

    const list = await readContract('list_proposals', [offset, limit]);
    if (Array.isArray(list)) {
      // Contract returns oldest-first within the page — reverse for newest-first feed display
      state.proposals = list.slice().reverse();
      state.totalProposals = total || list.length;
    }
  } catch (e) {
    console.warn('loadProposals:', e.message);
  } finally {
    state.loading.proposals = false;
  }
}

async function loadProposal(id) {
  state.loading.detail = true;
  try {
    const p = await readContract('get_proposal', [Number(id)]);
    if (p && p.id) {
      state.currentProposal = p;
      // Update in list too
      const idx = state.proposals.findIndex(x => x.id == id);
      if (idx >= 0) state.proposals[idx] = p;
      else state.proposals.unshift(p);
    }
  } catch (e) {
    console.warn('loadProposal:', e.message);
  } finally {
    state.loading.detail = false;
  }
}

async function loadHistory(offset = 0, limit = 20) {
  try {
    const hist = await readContract('get_governance_history', [offset, limit]);
    // Contract returns oldest-first (chronological append); reverse for newest-first display
    if (Array.isArray(hist)) state.history = hist.slice().reverse();
  } catch (e) {
    console.warn('loadHistory:', e.message);
  }
}

async function loadPendingActions() {
  try {
    const actions = await readContract('get_pending_actions');
    if (Array.isArray(actions)) state.pendingActions = actions;
  } catch (e) {
    console.warn('loadPendingActions:', e.message);
  }
}

async function loadWhitelist() {
  try {
    const wl = await readContract('get_whitelist');
    if (wl && typeof wl === 'object') state.whitelist = wl;
  } catch (e) {
    console.warn('loadWhitelist:', e.message);
  }
}

async function initData() {
  render();

  // Check network — up to 3 attempts with backoff (eliminates manual Retry on first load)
  let cfg = null;
  for (let attempt = 0; attempt < 3; attempt++) {
    cfg = await checkNetwork();
    if (cfg) break;
    if (attempt < 2) await new Promise(r => setTimeout(r, 2000 * (attempt + 1)));
  }

  if (!cfg) {
    state.networkOk = false;
    state.loading.proposals = false;
    state.loading.config = false;
    render();
    return;
  }
  state.config = cfg;
  state.loading.config = false;

  // Parallel load of all baseline data
  await Promise.all([
    loadAdmins(),
    loadConstitution(),
    loadProposals(),
    loadHistory(),
  ]);

  // Fix 7: resolve admin status AFTER admins are loaded (handles page refresh with wallet connected)
  if (state.wallet) {
    const wasAdmin = state.isAdmin;
    state.isAdmin = state.admins.some(a => a.toLowerCase() === state.wallet);
    if (state.isAdmin && !wasAdmin) {
      await Promise.all([loadPendingActions(), loadWhitelist()]);
    }
  } else if (state.isAdmin) {
    // Already set (won't happen on fresh load, but guard)
    await Promise.all([loadPendingActions(), loadWhitelist()]);
  }

  updateWalletUI();
  render();
  startPolling();
}

/* ══════════════════════════════════════════════════════════
   POLLING
   ══════════════════════════════════════════════════════════ */
function startPolling() {
  clearAllPolling();

  state.pollingTimers.proposals = setInterval(async () => {
    if (state.page === 'proposals') {
      await loadProposals();
      render();
    }
  }, CONFIG.POLL_PROPOSALS);

  state.pollingTimers.detail = setInterval(async () => {
    if (state.page === 'detail' && state.detailId) {
      await loadProposal(state.detailId);
      render();
    }
  }, CONFIG.POLL_DETAIL);

  state.pollingTimers.admin = setInterval(async () => {
    if (state.isAdmin) {
      await loadPendingActions();
      if (state.page === 'admin') render();
    }
  }, CONFIG.POLL_ADMIN);
}

function clearAllPolling() {
  Object.values(state.pollingTimers).forEach(clearInterval);
  state.pollingTimers = {};
}

/* ══════════════════════════════════════════════════════════
   WALLET
   ══════════════════════════════════════════════════════════ */
async function toggleWallet() {
  if (state.wallet) { disconnectWallet(); return; }
  await connectWallet();
}

async function connectWallet() {
  if (typeof window.ethereum === 'undefined') {
    showToast('No wallet detected', 'Install MetaMask to interact with GovLayer', 'error', 6000);
    return;
  }
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    if (!accounts || accounts.length === 0) {
      showToast('No accounts', 'Allow wallet access and try again', 'error', 4000);
      return;
    }
    state.wallet  = accounts[0].toLowerCase();
    // genlayer-js account object — isExternal:true means MetaMask signs the tx
    state.account = { address: state.wallet, isExternal: true };

    // Switch / add network
    try {
      const chainIdHex = await window.ethereum.request({ method: 'eth_chainId' });
      if (parseInt(chainIdHex, 16) !== CONFIG.CHAIN_ID) {
        try {
          await window.ethereum.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId: '0x' + CONFIG.CHAIN_ID.toString(16) }],
          });
        } catch (sw) {
          if (sw.code === 4902) {
            await window.ethereum.request({
              method: 'wallet_addEthereumChain',
              params: [{
                chainId: '0x' + CONFIG.CHAIN_ID.toString(16),
                chainName: CONFIG.NETWORK_NAME,
                rpcUrls: [CONFIG.RPC_URL],
                nativeCurrency: { name: 'GEN', symbol: 'GEN', decimals: 18 },
              }],
            }).catch(() => {
              showToast('Add network manually', `${CONFIG.NETWORK_NAME} · Chain ID ${CONFIG.CHAIN_ID}`, 'error', 7000);
            });
          }
        }
      }
    } catch (_) { /* chain check non-fatal */ }

    // React to wallet changes
    window.ethereum.removeAllListeners && window.ethereum.removeAllListeners('accountsChanged');
    window.ethereum.removeAllListeners && window.ethereum.removeAllListeners('chainChanged');
    window.ethereum.on('accountsChanged', accs => {
      if (!accs.length) { disconnectWallet(); return; }
      state.wallet  = accs[0].toLowerCase();
      state.account = { address: state.wallet, isExternal: true };
      afterWalletConnect();
    });
    window.ethereum.on('chainChanged', () => window.location.reload());

    await afterWalletConnect();
    showToast('Wallet connected', formatAddress(state.wallet), 'success', 3000);
  } catch (e) {
    if (e.code === 4001) showToast('Connection rejected', 'You cancelled the wallet request', 'error', 4000);
    else showToast('Connection failed', e.message, 'error', 5000);
  }
}

async function afterWalletConnect() {
  state.isAdmin = state.admins.some(a => a.toLowerCase() === state.wallet);
  if (state.isAdmin) await Promise.all([loadPendingActions(), loadWhitelist()]);
  updateWalletUI();
  render();
}

function disconnectWallet() {
  state.wallet  = null;
  state.account = null;
  state.isAdmin = false;
  updateWalletUI();
  render();
  showToast('Wallet disconnected', '', 'info', 2000);
}

function updateWalletUI() {
  [$('wallet-btn'), $('wallet-btn-mobile')].forEach(btn => {
    if (!btn) return;
    if (state.wallet) {
      btn.textContent = formatAddress(state.wallet);
      btn.classList.add('connected');
    } else {
      btn.textContent = btn.id === 'wallet-btn' ? 'Connect wallet' : 'Connect';
      btn.classList.remove('connected');
    }
  });

  const pendingCount = state.pendingActions.filter(a => a.status === 'pending').length;

  ['admin-chip','admin-chip-mobile'].forEach(id => {
    const el = $(id); if (!el) return;
    if (state.isAdmin) {
      el.classList.remove('hidden');
      el.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:var(--s-confirm-dot)"></span>Admin${pendingCount > 0 ? ` · ${pendingCount}` : ''}`;
    } else el.classList.add('hidden');
  });

  ['nav-admin','tab-admin'].forEach(id => {
    const el = $(id); if (!el) return;
    state.isAdmin ? el.classList.remove('hidden') : el.classList.add('hidden');
  });

  const badge = $('tab-admin-badge');
  if (badge) {
    if (pendingCount > 0) { badge.classList.remove('hidden'); badge.textContent = pendingCount; }
    else badge.classList.add('hidden');
  }

  const chip = $('eligibility-chip');
  if (chip && state.config) {
    const mode = state.config.eligibility_mode;
    const labels = { open:'Open governance', erc20:'Token gated', nft:'NFT gated', custom:'Custom eligibility' };
    const styles = {
      open:   'background:var(--s-accepted-bg);color:var(--s-accepted-text);border-color:var(--s-accepted-border)',
      erc20:  'background:var(--s-pending-bg);color:var(--s-pending-text);border-color:var(--s-pending-border)',
      nft:    'background:var(--s-review-bg);color:var(--s-review-text);border-color:var(--s-review-border)',
      custom: 'background:var(--surface-card);color:var(--text-secondary);border-color:var(--border)',
    };
    chip.textContent = labels[mode] || mode;
    chip.style.cssText = styles[mode] || '';
  }
}

/* ══════════════════════════════════════════════════════════
   NAVIGATION
   ══════════════════════════════════════════════════════════ */
function navigate(page, id) {
  state.page = page;
  const gen = ++state.renderGeneration;
  if (id !== undefined) { state.detailId = id; state.currentProposal = null; }

  ['proposals','constitution','governance','admin','about'].forEach(p => {
    const nav = $(`nav-${p}`), tab = $(`tab-${p}`);
    if (nav) nav.classList.toggle('active', p === page);
    if (tab) tab.classList.toggle('active', p === page);
  });

  // Initialise admin draft from live config whenever user navigates TO admin panel
  if (page === 'admin') resetAdminDraftFromConfig();

  render();

  if (page === 'detail' && id !== undefined) {
    loadProposal(id).then(() => {
      if (state.renderGeneration === gen) render();
    });
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ══════════════════════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════════════════════ */
function showToast(label, sub, type = 'info', duration = 5000) {
  const id = ++state.toastCounter;
  const container = $('toast-container');
  const dotColors = { info:'background:var(--violet-400)', success:'background:var(--s-accepted-dot)', error:'background:var(--s-rejected-dot)' };
  const indicator = type === 'pending'
    ? `<div class="toast-spinner" aria-hidden="true"></div>`
    : `<div class="toast-dot" style="${dotColors[type]||dotColors.info}" aria-hidden="true"></div>`;
  const el = document.createElement('div');
  el.className = 'toast'; el.id = `toast-${id}`; el.setAttribute('role','status');
  // toast-sub gets an id so startTxProgress can update it in-place
  el.innerHTML = `${indicator}<div class="toast-info"><div class="toast-label">${esc(label)}</div>${sub?`<div class="toast-sub" id="toast-sub-${id}">${esc(sub)}</div>`:`<div class="toast-sub" id="toast-sub-${id}" style="display:none"></div>`}</div><button class="toast-dismiss" onclick="dismissToast(${id})" aria-label="Dismiss">×</button>`;
  container.appendChild(el);
  if (duration > 0) setTimeout(() => dismissToast(id), duration);
  return id;
}

function dismissToast(id) {
  const el = $(`toast-${id}`); if (!el) return;
  el.classList.add('leaving');
  setTimeout(() => el.remove(), 200);
}

/* ══════════════════════════════════════════════════════════
   HTML HELPERS
   ══════════════════════════════════════════════════════════ */
const STATUS_LABELS = {
  pending:'Voting open', needs_revision:'Needs revision', accepted:'Accepted',
  rejected:'Rejected', under_review:'Under review',
  pending_constitution_confirm:'Awaiting admin', cancelled:'Cancelled',
};

function badgeHtml(status) {
  const label = STATUS_LABELS[status] || status;
  return `<span class="badge ${esc(status)}" role="status" aria-label="${label}"><span class="badge-dot" aria-hidden="true"></span>${label}</span>`;
}

function aiChipHtml(decision) {
  const c = {accept:'var(--s-accepted-dot)',revise:'var(--s-revision-dot)',reject:'var(--s-rejected-dot)'}[decision]||'var(--text-tertiary)';
  const l = {accept:'AI accepted',revise:'AI: revise',reject:'AI rejected'}[decision]||decision;
  return `<span class="ai-chip"><span class="ai-dot" style="background:${c}" aria-hidden="true"></span>${l}</span>`;
}

function timerHtml(votingEnd, p) {
  if (isVotingClosed(votingEnd)) {
    if (p && p.status === 'pending') return `<span class="timer finalize-ready">Ready to finalize</span>`;
    return `<span class="timer closed">Closed</span>`;
  }
  const cd = formatCountdown(votingEnd), urgent = isUrgent(votingEnd);
  return `<span class="timer${urgent?' urgent':''}">⏱ ${cd}</span>`;
}

function voteBarHtml(p, mini = false) {
  const yr    = Number(p.votes_yes || 0);
  const nr    = Number(p.votes_no  || 0);
  const total = yr + nr;
  const yesP = total > 0 ? Math.round((yr / total) * 100) : 0;
  const noP  = total > 0 ? Math.round((nr / total) * 100) : 0;
  const thr  = Number(state.config?.approval_threshold_percent || 60);
  const qm   = Number(state.config?.min_quorum || 10);

  if (mini) return `<div class="mini-bar-wrap" role="img" aria-label="${yesP}% for, ${noP}% against"><div class="mini-bar-yes" style="width:${yesP}%"></div><div class="mini-bar-no" style="width:${noP}%"></div></div>`;

  const passing = total >= qm && yesP >= thr && p.ai_audit_decision === 'accept';
  return `<div>
    <div class="vote-tally-large">
      <div><div class="tally-yes">${yr}<span class="tally-label">for</span></div></div>
      <div class="vote-tally-sep">·</div>
      <div><div class="tally-no">${nr}<span class="tally-label">against</span></div></div>
      <div style="margin-left:auto;font-size:12px;color:var(--text-tertiary);align-self:flex-end;padding-bottom:5px">${total} vote${total!==1?'s':''} cast</div>
    </div>
    <div class="vote-track" role="img" aria-label="Vote tally: ${yesP}% for, ${noP}% against">
      <div class="vote-yes" style="width:${yesP}%"></div>
      <div class="vote-no" style="width:${noP}%"></div>
      <div class="quorum-tick" style="left:${thr}%" title="${thr}% threshold"></div>
    </div>
    <div class="quorum-info mt-8">
      <span class="quorum-marker"></span>
      Threshold: ${thr}% · Quorum: ${qm} votes${passing?' · <strong style="color:var(--s-accepted-text)">Currently passing ✓</strong>':''}
    </div>
  </div>`;
}

function auditPanelHtml(p) {
  const vc = {accept:'verdict-accept',revise:'verdict-revise',reject:'verdict-reject'}[p.ai_audit_decision]||'verdict-accept';
  const vl = {accept:'Accepted',revise:'Needs revision',reject:'Rejected'}[p.ai_audit_decision]||p.ai_audit_decision;
  const isUpdate = p.proposal_type === 'constitution_update';
  const conflicts = Array.isArray(p.constitutional_conflicts) ? p.constitutional_conflicts : [];

  return `<div class="audit-panel">
    <div class="audit-header">
      <div class="audit-icon" aria-hidden="true">AI</div>
      <div style="flex:1"><div class="audit-source-title">Constitutional ${isUpdate?'amendment ':'AI '}review</div><div class="audit-source-sub">Evaluated against constitution snapshot at submission</div></div>
      <span class="verdict-chip ${vc}" role="status">${vl}</span>
    </div>
    <div class="audit-body">
      <div class="audit-reasoning">${esc(p.ai_audit_reasoning)}</div>
      ${conflicts.length > 0
        ? `<div class="t-label mb-8">Constitutional conflicts</div><div class="conflict-list">${conflicts.map(c=>`<div class="conflict-item"><div class="conflict-clause">${esc(c.clause)}</div><div class="conflict-text">${esc(c.violation)}</div></div>`).join('')}</div>`
        : `<div style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-tertiary)"><span style="width:8px;height:8px;border-radius:50%;background:var(--s-accepted-dot);display:inline-block"></span>No constitutional conflicts identified</div>`
      }
    </div>
  </div>`;
}

function constitutionDiffHtml(current, proposed) {
  if (!current || !proposed) return '';
  const cl = current.split('\n').slice(0,60), pl = proposed.split('\n').slice(0,60);
  let html = '', changes = 0;
  const max = Math.max(cl.length, pl.length);
  for (let i = 0; i < Math.min(max, 40); i++) {
    const c = cl[i]||'', p = pl[i]||'';
    if (c !== p) {
      changes++;
      if (c) html += `<div class="diff-line diff-removed"><span class="diff-marker">−</span>${esc(c)}</div>`;
      if (p) html += `<div class="diff-line diff-added"><span class="diff-marker">+</span>${esc(p)}</div>`;
    } else if (c.trim()) {
      html += `<div class="diff-line diff-same"><span class="diff-marker"> </span>${esc(c)}</div>`;
    }
  }
  return `<div class="diff-wrap"><div class="diff-header"><span>Proposed constitutional changes</span><span style="color:var(--s-accepted-text)">${changes} change${changes!==1?'s':''}</span></div>${html}</div>`;
}

function disputeTimelineHtml(history) {
  if (!history || history.length === 0) return `<div style="font-size:13px;color:var(--text-tertiary);text-align:center;padding:12px 0">No disputes yet.</div>`;
  return `<div class="dispute-timeline">${history.map((h,i)=>{
    const last = i === history.length-1;
    const dot = (h.resolution||'').toLowerCase().includes('accept')?'var(--s-accepted-dot)':'var(--s-rejected-dot)';
    return `<div class="dispute-stage"><div class="stage-line-col"><div class="stage-num" style="background:${dot}">${h.stage||i+1}</div>${!last?'<div class="stage-connector"></div>':''}</div><div class="stage-content"><div class="stage-label">Stage ${h.stage||i+1}</div><div class="stage-reason">${esc(h.reason)}</div><div class="stage-resolution">${esc(h.resolution)}</div><div class="stage-ts">${formatTimestamp(h.timestamp)}</div></div></div>`;
  }).join('')}</div>`;
}

function networkBannerHtml() {
  if (state.networkOk === false) {
    return `<div class="network-banner" role="alert">
      <span>⚠</span>
      <div>
        <strong>Cannot reach ${CONFIG.NETWORK_NAME}</strong> — showing cached data.
        Contract: <span style="font-family:var(--font-mono);font-size:11px">${formatAddress(CONFIG.CONTRACT_ADDRESS)}</span>
        <button onclick="initData()" style="margin-left:8px;font-size:11px;color:var(--s-review-text);background:none;border:none;cursor:pointer;text-decoration:underline">Retry</button>
      </div>
    </div>`;
  }
  return '';
}

/* ══════════════════════════════════════════════════════════
   ACTION SIDEBAR
   ══════════════════════════════════════════════════════════ */
function actionSidebarHtml(p) {
  let actionsHtml = '';
  const cfg = state.config || {};
  const closed = isVotingClosed(p.voting_end);
  const voted = state.userVotes[p.id];
  const myAddr = (state.wallet||'').toLowerCase();
  const isProposer = (p.proposer||'').toLowerCase() === myAddr;

  if (p.status === 'pending') {
    if (!closed) {
      if (!state.wallet) {
        actionsHtml = `<div class="connect-prompt mt-8"><div class="t-small mb-8">Connect wallet to vote</div><button class="btn-primary full-w" onclick="connectWallet()">Connect wallet</button></div>`;
      } else if (voted !== undefined) {
        actionsHtml = `<div class="already-voted-msg mt-8"><span class="voted-dot" style="background:${voted?'var(--s-accepted-dot)':'var(--s-rejected-dot)'}"></span>You voted <strong>${voted?'for':'against'}</strong> this proposal</div>`;
      } else {
        actionsHtml = `<div class="vote-buttons mt-8"><button class="btn-vote-for" onclick="handleVote(${p.id},true)">Vote for</button><button class="btn-vote-against" onclick="handleVote(${p.id},false)">Vote against</button></div>`;
      }
      if (isProposer) actionsHtml += `<button class="btn-danger full-w mt-8" onclick="handleCancel(${p.id})">Cancel proposal</button>`;
    } else {
      actionsHtml = `<button class="finalize-cta mt-8" onclick="handleFinalize(${p.id})"><span>⚖</span> Close voting &amp; record outcome</button><div class="form-note mt-8">Anyone can close the vote</div>`;
    }
  }

  if (p.status === 'needs_revision' && isProposer) {
    const remaining = Number(cfg.max_resubmissions||3) - Number(p.resubmit_count||0);
    actionsHtml = `<button class="btn-primary full-w mt-8" onclick="navigate('resubmit',${p.id})">Revise and resubmit</button><div class="form-note">${remaining} revision${remaining!==1?'s':''} remaining</div>`;
  }

  if (['rejected','accepted'].includes(p.status)) {
    const maxStages = Number(cfg.max_dispute_stages||3);
    const cooldown  = Number(cfg.dispute_cooldown_seconds||3600);
    const count     = Number(p.dispute_count||0);
    // Contract access control: only proposer, a voter on this proposal, or admin can raise dispute
    const isVoter = state.wallet && state.userVotes[p.id] !== undefined;
    const canDispute = state.wallet && (isProposer || isVoter || state.isAdmin);

    if (count < maxStages) {
      if (!state.wallet) {
        actionsHtml += `<div class="mt-8 connect-prompt"><div class="t-small mb-8">Connect wallet to raise a dispute</div><button class="btn-primary full-w" onclick="connectWallet()">Connect wallet</button></div>`;
      } else if (!canDispute) {
        actionsHtml += `<div class="mt-8" style="font-size:12px;color:var(--text-tertiary);padding:8px 0">Only the proposer, a voter on this proposal, or an admin can raise a dispute.</div>`;
      } else {
        const lastAt = Number(p.last_dispute_at||0);
        const elapsed = Math.floor(Date.now()/1000) - lastAt;
        if (lastAt === 0 || elapsed >= cooldown) {
          actionsHtml += `<button class="btn-secondary full-w mt-8" onclick="navigate('dispute-form',${p.id})">Raise a dispute</button>`;
        } else {
          const unlockAt = lastAt + cooldown;
          actionsHtml += `<div class="mt-8"><span class="timer cooldown">Next dispute in ${formatCountdown(unlockAt)}</span></div>`;
        }
      }
    } else if (count >= maxStages) {
      actionsHtml += `<div class="mt-8" style="font-size:12px;color:var(--text-tertiary)">Maximum dispute stages (${maxStages}) reached.</div>`;
    }
  }

  if (p.status === 'pending_constitution_confirm' && state.isAdmin) {

  }

  const yr = Number(p.votes_yes||0), nr = Number(p.votes_no||0), tr = yr+nr;
  const yp = tr>0?Math.round((yr/tr)*100):0;

  return `<div class="sidebar-card">
    <div class="sidebar-section">
      <div class="t-label mb-8">Proposal details</div>
      <div>
        <div class="param-row"><span class="param-key">Status</span>${badgeHtml(p.status)}</div>
        <div class="param-row"><span class="param-key">Type</span><span class="param-val">${p.proposal_type==='constitution_update'?'Constitution update':'Standard'}</span></div>

        <div class="param-row"><span class="param-key">Submitted</span><span style="font-size:12px;color:var(--text-secondary)">${formatTimestamp(Number(p.submitted_at))}</span></div>
        ${p.status==='pending'?`<div class="param-row"><span class="param-key">Closes</span><span style="font-size:12px;color:var(--s-pending-text);font-weight:500">${formatTimestamp(Number(p.voting_end))}</span></div>`:''}
        <div class="param-row"><span class="param-key">AI verdict</span><span class="param-val" style="color:${p.ai_audit_decision==='accept'?'var(--s-accepted-text)':p.ai_audit_decision==='reject'?'var(--s-rejected-text)':'var(--s-revision-text)'}">${{accept:'Accepted',revise:'Revise',reject:'Rejected'}[p.ai_audit_decision]||p.ai_audit_decision}</span></div>
        ${Number(p.resubmit_count||0)>0?`<div class="param-row"><span class="param-key">Revisions</span><span class="param-val">${p.resubmit_count} of ${state.config?.max_resubmissions||3} used</span></div>`:''}
      </div>

  ${Number(p.dispute_count||0)>0||p.status==='under_review'?`<div class="sidebar-card mt-0"><div class="sidebar-section"><div class="t-label mb-12">Disputes (${p.dispute_count||0} stage${Number(p.dispute_count||0)!==1?'s':''})</div>${disputeTimelineHtml(p.dispute_history)}</div></div>`:''}`;
}

/* ══════════════════════════════════════════════════════════
   GOVERNANCE PROCESS STRIP
   Shows where a proposal sits in the full lifecycle.
   ══════════════════════════════════════════════════════════ */
function processStripHtml(p) {
  const steps = [
    { key: 'submitted',  label: 'Submitted'  },
    { key: 'audit',      label: 'AI Audit'   },
    { key: 'voting',     label: 'Voting'     },
    { key: 'finalized',  label: 'Finalized'  },
  ];

  const statusToStep = {
    needs_revision:              'audit',
    pending:                     'voting',
    under_review:                'finalized',
    pending_constitution_confirm:'finalized',
    accepted:                    'done',
    rejected:                    'done',
    cancelled:                   'done',
  };

  const currentStep = statusToStep[p.status] || 'submitted';

  const stepOrder = ['submitted','audit','voting','finalized','done'];
  const currentIdx = stepOrder.indexOf(currentStep);

  const stepsHtml = steps.map((step, i) => {
    let cls = 'future';
    if (i < currentIdx || currentStep === 'done') cls = 'done';
    else if (stepOrder[i] === currentStep) cls = 'active';

    const icon = cls === 'done' ? '✓ ' : '';
    return `<span class="process-step ${cls}">${icon}${step.label}</span>`;
  }).join('<span class="process-arrow">›</span>');

  return `<div class="process-strip" role="navigation" aria-label="Proposal progress">${stepsHtml}</div>`;
}
