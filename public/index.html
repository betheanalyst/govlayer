   ══════════════════════════════════════════════════════════ */

function renderActionBanner() {
  const finalizeable = state.proposals.filter(p => p.status === 'pending' && isVotingClosed(p.voting_end));
  const confirmNeeded = state.proposals.filter(p => p.status === 'pending_constitution_confirm' && state.isAdmin);
  if (finalizeable.length === 0 && confirmNeeded.length === 0) return '';
  let text, cta, action;
  if (confirmNeeded.length > 0) {
    const p = confirmNeeded[0];
    text = `<strong>Proposal #${p.id}</strong> — vote passed. Admin confirmation required to apply constitutional amendment.`;
    cta = 'Confirm now'; action = `navigate('detail',${p.id})`;
  } else {
    const p = finalizeable[0];
    text = `<strong>Proposal #${p.id} "${esc((p.title||'').slice(0,40))}${(p.title||'').length>40?'…':''}"</strong> — voting closed, ready to finalize`;
    cta = 'Close voting →'; action = `handleFinalize(${p.id})`;
  }
  return `<div class="action-banner" role="alert"><div class="container"><div class="action-banner-inner"><span class="action-banner-text">${text}</span><button class="btn-banner" onclick="${action}">${cta}</button></div></div></div>`;
}

function renderProposalsFeed() {
  const filter = state.filters.proposals;
  let filtered = state.proposals;
  if (filter === 'active') filtered = state.proposals.filter(p => ['pending','needs_revision','under_review'].includes(p.status));
  else if (filter === 'attention') filtered = state.proposals.filter(p =>
    (p.status==='pending' && isVotingClosed(p.voting_end)) ||
    p.status==='pending_constitution_confirm' ||
    (p.status==='needs_revision' && (p.proposer||'').toLowerCase()===(state.wallet||'').toLowerCase())
  );

  const skeletons = state.loading.proposals
    ? [1,2,3].map(() => `<div class="skeleton-card"><div class="sk-badge"></div><div class="sk-line" style="width:75%"></div><div class="sk-line" style="width:50%;margin-bottom:12px"></div><div class="sk-bar"></div></div>`).join('')
    : '';

  const cardsHtml = state.loading.proposals ? skeletons : filtered.length === 0
    ? `<div class="empty-state"><div class="empty-icon" aria-hidden="true">📜</div><div class="empty-title">No ${filter==='active'?'active ':filter==='attention'?'attention-needed ':''}proposals</div><div class="empty-sub">${filter==='active'?'All proposals have been finalized. Submit a new proposal to start a governance discussion.':'Everything is up to date.'}</div><div><button class="btn-primary" onclick="navigate('create')" style="margin-right:8px">Submit proposal</button><button class="btn-secondary" onclick="setFilter('all')">View all</button></div></div>`
    : filtered.map((p,i) => {
        const yr = Number(p.votes_yes||0), nr = Number(p.votes_no||0), tr = yr+nr;
        const yp = tr>0?Math.round((yr/tr)*100):0, np = tr>0?Math.round((nr/tr)*100):0;
        const closed = isVotingClosed(p.voting_end);
        let cta = '';
        if (p.status==='pending' && !closed) cta = `<span class="card-cta">Vote →</span>`;
        else if (p.status==='pending' && closed) cta = `<span class="card-cta" style="background:var(--s-revision-bg);border-color:var(--s-revision-border);color:var(--s-revision-text)">Finalize →</span>`;
        else if (p.status==='needs_revision' && (p.proposer||'').toLowerCase()===(state.wallet||'').toLowerCase()) cta = `<span class="card-cta" style="background:var(--s-revision-bg);border-color:var(--s-revision-border);color:var(--s-revision-text)">Revise →</span>`;
        else if (p.status==='pending_constitution_confirm' && state.isAdmin) cta = `<span class="card-cta" style="background:var(--s-confirm-bg);border-color:var(--s-confirm-border);color:var(--s-confirm-text)">Confirm →</span>`;
        return `<article class="proposal-card${state.detailId==p.id?' selected':''}" style="animation-delay:${i*40}ms" onclick="navigate('detail',${p.id})" role="link" tabindex="0" onkeydown="if(event.key==='Enter')navigate('detail',${p.id})" aria-label="Proposal #${p.id}: ${esc(p.title)}, ${STATUS_LABELS[p.status]||p.status}">
          <div class="card-badges">${badgeHtml(p.status)}${p.proposal_type==='constitution_update'?'<span class="badge constitution-type"><span class="badge-dot"></span>Constitution</span>':''}<span class="docket" style="margin-left:auto">GL-${String(p.id).padStart(4,'0')}</span></div>
          <div class="card-top"><div class="card-title">${esc(p.title)}</div>${p.status==='pending'?timerHtml(p.voting_end,p):''}</div>

function setFilter(f) { state.filters.proposals = f; render(); }

  if (state.loading.detail && !p) {
    return `<div class="container" style="padding-top:20px"><div class="skeleton-card" style="height:400px"><div class="sk-badge" style="margin-bottom:20px"></div><div class="sk-line" style="width:70%;height:20px;margin-bottom:12px"></div><div class="sk-line" style="width:50%"></div></div></div>`;
  }
  if (!p) return `<div class="container" style="padding-top:32px"><div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Proposal not found</div><div class="empty-sub">This proposal may not exist.</div><button class="btn-primary" onclick="navigate('proposals')">Back to proposals</button></div></div>`;

  const hasUpdate = p.proposal_type === 'constitution_update' && p.proposed_constitution;
  const closed = isVotingClosed(p.voting_end);

  return `<div class="container" style="padding-top:20px">

          ${processStripHtml(p)}
          <div class="prop-meta-row">
            <span class="docket">GL-${String(p.id).padStart(4,'0')}</span>
            <span style="width:3px;height:3px;border-radius:50%;background:var(--text-tertiary);display:inline-block"></span>
            ${badgeHtml(p.status)}
            ${p.proposal_type==='constitution_update'?'<span class="badge constitution-type"><span class="badge-dot"></span>Constitution update</span>':''}
            ${p.status==='pending'?timerHtml(p.voting_end,p):''}
          </div>
          <h1 class="prop-detail-title">${esc(p.title)}</h1>

            ${p.status==='pending'?`<span>Closes ${formatTimestamp(Number(p.voting_end))}</span>`:''}
          </div>
        </header>

        <div>
          <div class="t-label mb-8">Proposal</div>
          <div class="content-card"><p class="prop-description">${esc(p.description)}</p></div>
        </div>

        ${hasUpdate?`<div><div class="t-label mb-8">Proposed constitutional amendment</div>${constitutionDiffHtml(p.constitution_snapshot,p.proposed_constitution)}</div>`:''}

        <div>
          <div class="t-label mb-8">Constitutional ${p.proposal_type==='constitution_update'?'amendment':'AI'} review</div>
          ${auditPanelHtml(p)}
        </div>

        ${tr > 0 || p.status === 'pending' ? `<div>
          <div class="t-label mb-8">Voting</div>
          <div class="content-card">
            ${voteBarHtml(p)}
            ${p.status==='pending' && !closed && state.wallet && voted===undefined
              ? `<div class="vote-buttons mt-16"><button class="btn-vote-for" onclick="handleVote(${p.id},true)">Vote for</button><button class="btn-vote-against" onclick="handleVote(${p.id},false)">Vote against</button></div>`
              : ''}
            ${voted!==undefined?`<div class="already-voted-msg mt-16"><span class="voted-dot" style="background:${voted?'var(--s-accepted-dot)':'var(--s-rejected-dot)'}"></span>You voted <strong>${voted?'for':'against'}</strong> this proposal</div>`:''}

}

      </div>
      <div class="form-section">
        <div class="t-label mb-12">Voting window</div>
        <div class="field-label mb-8">Duration <span class="field-hint">between ${formatSeconds(cfg.min_voting_duration||3600)} and ${formatSeconds(cfg.max_voting_duration||2592000)}</span></div>
        <div class="duration-chips">
          ${durations.map(d=>`<button class="dur-chip${form.duration===d.val?' selected':''}" onclick="state.createForm.duration=${d.val};render()" aria-pressed="${form.duration===d.val}">${d.label}</button>`).join('')}
        </div>
        <div class="form-note" style="text-align:left;margin-top:8px">Voting opens immediately when the AI audit passes. Window: ${formatSeconds(form.duration)}.</div>

      <div class="form-section">

function renderResubmit() {
  const p = state.proposals.find(x => x.id == state.detailId);
  if (!p) { navigate('proposals'); return ''; }
  const cfg = state.config||{};
  const remaining = Number(cfg.max_resubmissions||3) - Number(p.resubmit_count||0);
  const conflicts = Array.isArray(p.constitutional_conflicts)?p.constitutional_conflicts:[];

  return `<div class="container" style="padding-top:20px;max-width:680px">
    <button class="back-link" onclick="navigate('detail',${p.id})">← Proposal #${p.id}</button>
    <h1 class="page-title" style="margin-bottom:4px;font-family:var(--font-display)">Revision required</h1>
    <p class="t-small mb-16" style="margin-bottom:20px">Address the issues below and resubmit for AI re-audit.</p>
    ${conflicts.length>0?`<div class="revision-panel mb-16"><div class="revision-header"><div class="revision-title"><span class="revision-icon">!</span>${conflicts.length} issue${conflicts.length!==1?'s':''} to address</div><span class="revision-count-chip">${remaining} revision${remaining!==1?'s':''} remaining</span></div><div class="revision-body">${conflicts.map((c,i)=>`<div class="checklist-item"><div class="check-num">${i+1}</div><div><div class="check-clause">${esc(c.clause)}</div><div class="check-issue">${esc(c.violation)}</div></div></div>`).join('')}</div></div>`:''}
    <div class="form-card">
      <div class="form-section">
        <label class="field-label" for="r-desc">Updated description</label>
        <textarea class="field-input" id="r-desc" rows="7" placeholder="Address the issues identified above...">${esc(p.description)}</textarea>
      </div>
      <div class="form-section">
        <button class="btn-primary full-w" onclick="handleResubmit(${p.id},document.getElementById('r-desc').value)">Resubmit for AI review →</button>
        <div class="form-note">Re-audit uses the constitution snapshot from your original submission. ${remaining} revision${remaining!==1?'s':''} remaining.</div>
      </div>
    </div>
  </div>`;
}

function renderConstitution() {
  const text = state.constitution;
  const pendingUpdate = state.proposals.find(p => p.proposal_type==='constitution_update' && p.status==='pending_constitution_confirm');

  if (!text) return `<div class="container" style="padding-top:32px"><div class="empty-state"><div class="empty-icon">📜</div><div class="empty-title">Loading constitution…</div><div class="empty-sub">Fetching from the GenLayer network.</div></div></div>`;

  const articles = text.split(/\n(?=ARTICLE \d+)/);
  return `<div class="container" style="padding-top:24px;max-width:780px">
    ${pendingUpdate?`<div style="background:var(--s-confirm-bg);border:.5px solid var(--s-confirm-border);border-radius:8px;padding:14px 16px;margin-bottom:24px;display:flex;align-items:flex-start;gap:10px" role="alert"><span>⚠</span><div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--s-confirm-text);margin-bottom:4px">Constitutional amendment pending</div><div style="font-size:12px;color:var(--s-confirm-text);opacity:.85;line-height:1.5">Proposal #${pendingUpdate.id} "${esc(pendingUpdate.title)}" has passed the community vote and is awaiting admin confirmation.</div>${state.isAdmin?`<button class="btn-primary mt-8" style="font-size:12px;padding:5px 14px;background:var(--s-confirm-dot)" onclick="navigate('detail',${pendingUpdate.id})">Review and confirm →</button>`:''}</div></div>`:''}
    <div class="page-header" style="padding-bottom:16px">
      <h1 class="page-title">Constitution</h1>
      <div class="page-header-right"><span class="t-mono" style="font-size:11px">v1.0</span>${pendingUpdate?`<span class="badge pending_constitution_confirm"><span class="badge-dot"></span>Amendment pending</span>`:`<span class="badge accepted"><span class="badge-dot"></span>Active</span>`}</div>
    </div>
    <div style="font-size:14px;line-height:1.75;color:var(--text-primary)">
      ${articles.map(article=>{
        if (!article.trim()) return '';
        const lines = article.trim().split('\n');
        const title = lines[0].trim();
        const blocks = lines.slice(1).join('\n').split(/\n(?=\d+\.\d+)/).filter(Boolean);
        return `<div class="const-article"><div class="const-article-title">${esc(title)}</div>${blocks.map(block=>{
          const bl = block.trim().split('\n');
          const m = bl[0].trim().match(/^(\d+\.\d+)\s+(.+)/);
          if (!m) return `<p style="font-size:13px;line-height:1.7;color:var(--text-secondary);margin-bottom:12px">${esc(block.trim())}</p>`;
          const [,num,ctitle] = m;
          const ctext = bl.slice(1).join('\n').trim();
          return `<div class="const-clause" id="clause-${num.replace('.','-')}"><div class="const-clause-num">§ ${esc(num)}</div><div class="const-clause-title">${esc(ctitle)}</div>${ctext?`<div class="const-clause-text">${esc(ctext)}</div>`:''}</div>`;
        }).join('')}</div>`;
      }).join('')}
    </div>
  </div>`;
}

  if (!state.isAdmin) return `<div class="container" style="padding-top:32px;max-width:580px"><div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-title">Admin access required</div><div class="empty-sub">Your connected wallet does not have admin privileges for this protocol.</div><button class="btn-primary" onclick="navigate('proposals')">Back to proposals</button></div></div>`;

  const cfg = state.config || {};
  const pending = state.pendingActions.filter(a => a.status === 'pending');
  const myAddr = (state.wallet || '').toLowerCase();

  // Constitution proposals awaiting admin confirmation
  const pendingConstitution = state.proposals.filter(p => p.status === 'pending_constitution_confirm');

  // Determine remove path: direct remove_admin (3+ admins) vs propose_admin_action (2 admins)
  const adminCount = state.admins.length;
  const useMultisigRemove = adminCount <= 2;

  return `<div class="container" style="padding-top:24px">
    <div class="page-header"><h1 class="page-title">Admin panel</h1></div>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:24px">Actions marked <span style="background:var(--s-confirm-bg);color:var(--s-confirm-text);border:.5px solid var(--s-confirm-border);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:500">2-admin</span> require approval from a second admin within 24 hours.</p>

    <div class="admin-grid">

      ${pendingConstitution.length > 0 ? `
      <div class="admin-card" style="border-color:var(--s-confirm-border);background:var(--s-confirm-bg)">
        <div class="admin-card-header" style="background:var(--s-confirm-bg)"><span class="admin-card-title" style="color:var(--s-confirm-text)">⚠ Constitution confirmation required</span></div>
        <div class="admin-card-body">
          ${pendingConstitution.map(p => `
          <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:.5px solid var(--s-confirm-border)">
            <div style="font-size:13px;font-weight:500;color:var(--s-confirm-text);margin-bottom:4px">Proposal #${p.id} — ${esc(p.title)}</div>
            <div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">Vote passed. Apply constitutional amendment to chain.</div>
            <button class="btn-primary" style="font-size:12px;padding:6px 14px;background:var(--s-confirm-dot)" onclick="handleConfirmConstitution(${p.id})">Confirm &amp; apply amendment →</button>
          </div>`).join('')}
        </div>
      </div>` : ''}

      <!-- MULTISIG PENDING ACTIONS -->
      <div class="admin-card">
        <div class="admin-card-header">
          <span class="admin-card-title">Pending multisig actions</span>
          ${pending.length > 0 ? `<span class="badge pending_constitution_confirm" style="font-size:10px"><span class="badge-dot"></span>${pending.length} pending</span>` : '<span class="t-small">None</span>'}
        </div>
        <div class="admin-card-body">
          ${pending.length === 0
            ? '<div class="t-small" style="text-align:center;padding:12px 0;color:var(--text-tertiary)">No pending actions</div>'
            : pending.map(a => {
                const params = (() => { try { return JSON.parse(a.params); } catch(_) { return {}; } })();
                const isYours = (a.proposer || '').toLowerCase() === myAddr;
                const expiresAt = Number(a.proposed_at) + 86400;
                const expired = Math.floor(Date.now()/1000) > expiresAt;
                return `<div class="multisig-action-card">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                    <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--s-confirm-text);flex:1">${esc((a.action_type||'').replace(/_/g,' '))}</div>
                    <span style="font-size:10px;color:${expired?'var(--s-rejected-text)':'var(--text-tertiary)'}">${expired?'Expired':('Expires ' + formatCountdown(expiresAt))}</span>
                  </div>
                  <div style="font-size:12px;color:var(--text-primary);margin-bottom:4px">
                    ${a.action_type==='remove_admin'?`Remove admin: <span class="t-mono">${formatAddress(params.target||'')}</span>`
                    :a.action_type==='set_eligibility_mode'?`Set eligibility mode → <strong>${esc(params.mode||'')}</strong>`
                    :a.action_type==='constitution_update_propose'?`Apply constitution from proposal #${params.proposal_id}`
                    :esc(a.action_type)}
                  </div>
                  <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:8px">
                    Proposed by <span class="t-mono">${formatAddress(a.proposer)}</span>
                  </div>
                  <div style="display:flex;align-items:center;gap:8px">
                    <div style="flex:1;height:4px;background:var(--surface-hover);border-radius:9999px;overflow:hidden"><div style="width:50%;height:100%;background:var(--s-confirm-dot);border-radius:9999px"></div></div>
                    <span style="font-size:10px;color:var(--s-confirm-text);font-weight:500">1 of 2 admins</span>
                  </div>
                  <div style="margin-top:8px">
                    ${isYours
                      ? '<div style="font-size:11px;color:var(--text-tertiary);font-style:italic">You proposed this — a different admin must approve</div>'
                      : expired
                        ? '<div style="font-size:11px;color:var(--s-rejected-text)">This action has expired. Propose it again.</div>'
                        : `<button class="btn-primary" style="font-size:12px;padding:6px 14px" onclick="handleApproveAction('${esc(a.action_id)}')">Approve &amp; execute →</button>`}
                  </div>
                </div>`;
              }).join('')}
        </div>
      </div>

      <!-- ADMIN MANAGEMENT -->
      <div class="admin-card">
        <div class="admin-card-header">
          <span class="admin-card-title">Admin accounts</span>
          <span class="badge accepted" style="font-size:10px"><span class="badge-dot"></span>${state.admins.length} of ${cfg.max_admins||5}</span>
        </div>
        <div class="admin-card-body">
          ${state.admins.map((a, i) => {
            const you = a.toLowerCase() === myAddr;
            const bg = ['#DDD9FB,#4239C4','#D4F5E6,#1A6040','#FDE8D0,#8A4A08'][i % 3].split(',');
            const canRemove = !you && adminCount > 1;
            const removeAction = useMultisigRemove
              ? `onclick="handleProposeAdminAction('remove_admin',{target:'${a}'})" title="Requires second admin approval"`
              : `onclick="handleDirectRemoveAdmin('${a}')"`;
            return `<div class="roster-row">
              <div class="avatar" style="background:${bg[0]};color:${bg[1]}">${a.slice(2,4).toUpperCase()}</div>
              <div style="flex:1">
                <div class="t-mono" style="font-size:11px;color:var(--text-secondary)">${a}</div>
                ${you ? '<div style="font-size:10px;color:var(--text-info);font-weight:500">You</div>' : ''}
              </div>
              ${canRemove
                ? `<button class="btn-secondary" style="font-size:11px;padding:3px 10px" ${removeAction}>
                     ${useMultisigRemove ? '<span style="font-size:9px;margin-right:3px;opacity:.7">2-admin</span>' : ''}Remove
                   </button>`
                : (you ? '<span style="font-size:10px;color:var(--text-tertiary)">current</span>' : '')}
            </div>`;
          }).join('')}
          <div style="margin-top:14px;padding-top:12px;border-top:.5px solid var(--border)">
            <div class="field-label mb-8">Add admin</div>
            <div class="field-hint" style="margin-bottom:8px">Address must be a valid 0x… wallet. Max ${cfg.max_admins||5} admins total.</div>
            <input class="field-input" id="new-admin-input" placeholder="0x1234…abcd" value="${esc(_adminDraft.newAdmin||'')}" style="margin-bottom:6px">
            <button class="btn-secondary full-w" style="font-size:12px" onclick="handleAddAdmin(document.getElementById('new-admin-input').value)">+ Add admin</button>
          </div>
        </div>
      </div>

      <!-- GOVERNANCE PARAMETERS -->
      <div class="admin-card">
        <div class="admin-card-header"><span class="admin-card-title">Governance parameters</span></div>
        <div class="admin-card-body">
          <div class="field-hint" style="margin-bottom:12px">Changes take effect immediately after transaction confirms.</div>
          <div class="field">
            <label class="field-label" for="ap-quorum">Min quorum <span class="field-hint">minimum votes for a valid result · on-chain: ${cfg.min_quorum||10}</span></label>
            <input class="field-input" id="ap-quorum" type="number" min="1" placeholder="e.g. 10" value="${esc(_adminDraft.quorum ?? cfg.min_quorum ?? 10)}">
          </div>
          <div class="field">
            <label class="field-label" for="ap-threshold">Approval threshold % <span class="field-hint">1–100 · on-chain: ${cfg.approval_threshold_percent||60}%</span></label>
            <input class="field-input" id="ap-threshold" type="number" min="1" max="100" placeholder="e.g. 60" value="${esc(_adminDraft.threshold ?? cfg.approval_threshold_percent ?? 60)}">
          </div>
          <div class="field">
            <label class="field-label" for="ap-mindur">Min voting duration (seconds) <span class="field-hint">on-chain: ${cfg.min_voting_duration||3600} = ${formatSeconds(cfg.min_voting_duration||3600)}</span></label>
            <input class="field-input" id="ap-mindur" type="number" min="1" placeholder="e.g. 3600 (1 hour)" value="${esc(_adminDraft.minDur ?? cfg.min_voting_duration ?? 3600)}">
          </div>
          <div class="field">
            <label class="field-label" for="ap-maxdur">Max voting duration (seconds) <span class="field-hint">must exceed min · on-chain: ${cfg.max_voting_duration||2592000} = ${formatSeconds(cfg.max_voting_duration||2592000)}</span></label>
            <input class="field-input" id="ap-maxdur" type="number" min="1" placeholder="e.g. 2592000 (30 days)" value="${esc(_adminDraft.maxDur ?? cfg.max_voting_duration ?? 2592000)}">
          </div>
          <button class="btn-primary full-w" style="margin-top:8px" onclick="(() => {
            const q=parseInt($('ap-quorum').value), t=parseInt($('ap-threshold').value),
                  mn=parseInt($('ap-mindur').value), mx=parseInt($('ap-maxdur').value);
            if(!q||q<1){showToast('Invalid','Min quorum must be ≥ 1','error',3000);return;}
            if(!t||t<1||t>100){showToast('Invalid','Threshold must be 1–100','error',3000);return;}
            if(!mn||mn<1){showToast('Invalid','Min duration must be > 0','error',3000);return;}
            if(!mx||mx<=mn){showToast('Invalid','Max duration must exceed min duration','error',3000);return;}
            handleSetGovernanceParams(q,t,mn,mx);
          })()">Update governance params →</button>
        </div>
      </div>

      <!-- SAFETY PARAMETERS -->
      <div class="admin-card">
        <div class="admin-card-header"><span class="admin-card-title">Safety parameters</span></div>
        <div class="admin-card-body">
          <div class="field-hint" style="margin-bottom:12px">Controls dispute and revision limits across all proposals.</div>
          <div class="field">
            <label class="field-label" for="sp-stages">Max dispute stages <span class="field-hint">AI re-evaluations per proposal · on-chain: ${cfg.max_dispute_stages||3}</span></label>
            <input class="field-input" id="sp-stages" type="number" min="1" placeholder="e.g. 3" value="${esc(_adminDraft.stages ?? cfg.max_dispute_stages ?? 3)}">
          </div>
          <div class="field">
            <label class="field-label" for="sp-cooldown">Dispute cooldown (seconds) <span class="field-hint">wait between dispute stages · on-chain: ${cfg.dispute_cooldown_seconds||3600} = ${formatSeconds(cfg.dispute_cooldown_seconds||3600)}</span></label>
            <input class="field-input" id="sp-cooldown" type="number" min="1" placeholder="e.g. 3600 (1 hour)" value="${esc(_adminDraft.cooldown ?? cfg.dispute_cooldown_seconds ?? 3600)}">
          </div>
          <div class="field">
            <label class="field-label" for="sp-resubmit">Max resubmissions <span class="field-hint">revisions allowed per proposal · on-chain: ${cfg.max_resubmissions||3}</span></label>
            <input class="field-input" id="sp-resubmit" type="number" min="1" placeholder="e.g. 3" value="${esc(_adminDraft.resubmit ?? cfg.max_resubmissions ?? 3)}">
          </div>
          <button class="btn-primary full-w" style="margin-top:8px" onclick="(() => {
            const st=parseInt($('sp-stages').value), cd=parseInt($('sp-cooldown').value), rs=parseInt($('sp-resubmit').value);
            if(!st||st<1){showToast('Invalid','Max dispute stages must be ≥ 1','error',3000);return;}
            if(!cd||cd<1){showToast('Invalid','Cooldown must be > 0 seconds','error',3000);return;}
            if(!rs||rs<1){showToast('Invalid','Max resubmissions must be ≥ 1','error',3000);return;}
            handleSetSafetyParams(st,cd,rs);
          })()">Update safety params →</button>
        </div>
      </div>

      <!-- TOKEN RULES -->
      <div class="admin-card">
        <div class="admin-card-header"><span class="admin-card-title">Token rules</span></div>
        <div class="admin-card-body">
          <div class="field-hint" style="margin-bottom:12px">Set ERC-20 or NFT token address and minimum balances required to vote or propose. Use the zero address to disable token gating.</div>
          <div class="field">
            <label class="field-label" for="tr-token">Token contract address <span class="field-hint">ERC-20 or NFT · zero address = no token gate</span></label>
            <input class="field-input" id="tr-token" type="text" placeholder="0x0000…0000 (zero = none)" value="${esc(_adminDraft.tokenAddr ?? cfg.voting_token ?? '0x0000000000000000000000000000000000000000')}">
          </div>
          <div class="field">
            <label class="field-label" for="tr-minvote">Min tokens to vote <span class="field-hint">0 = no minimum · on-chain: ${cfg.min_tokens_to_vote||0}</span></label>
            <input class="field-input" id="tr-minvote" type="number" min="0" placeholder="e.g. 100" value="${esc(_adminDraft.minVote ?? cfg.min_tokens_to_vote ?? 0)}">
          </div>
          <div class="field">
            <label class="field-label" for="tr-minpropose">Min tokens to propose <span class="field-hint">0 = no minimum · on-chain: ${cfg.min_tokens_to_propose||0}</span></label>
            <input class="field-input" id="tr-minpropose" type="number" min="0" placeholder="e.g. 1000" value="${esc(_adminDraft.minPropose ?? cfg.min_tokens_to_propose ?? 0)}">
          </div>
          <button class="btn-primary full-w" style="margin-top:8px" onclick="(() => {
            const tok=$('tr-token').value.trim(), mv=parseInt($('tr-minvote').value), mp=parseInt($('tr-minpropose').value);
            if(!tok||!tok.startsWith('0x')){showToast('Invalid','Token address must start with 0x','error',3000);return;}
            if(isNaN(mv)||mv<0){showToast('Invalid','Min vote tokens must be ≥ 0','error',3000);return;}
            if(isNaN(mp)||mp<0){showToast('Invalid','Min propose tokens must be ≥ 0','error',3000);return;}
            handleSetTokenRules(tok,mv,mp);
          })()">Update token rules →</button>
        </div>
      </div>

      <!-- ELIGIBILITY MODE (multisig) -->
      <div class="admin-card">
        <div class="admin-card-header">
          <span class="admin-card-title">Eligibility mode</span>
          <span style="background:var(--s-confirm-bg);color:var(--s-confirm-text);border:.5px solid var(--s-confirm-border);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:500">2-admin</span>
        </div>
        <div class="admin-card-body">
          <div class="field-hint" style="margin-bottom:12px">Requires a second admin to approve. Current mode: <strong>${cfg.eligibility_mode||'open'}</strong>.</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">
            ${['open','erc20','nft','custom'].map(mode => `
              <button class="type-opt${(cfg.eligibility_mode||'open')===mode?' selected':''}" style="padding:8px 10px" onclick="handleProposeAdminAction('set_eligibility_mode',{mode:'${mode}'})">
                <div class="type-opt-title" style="font-size:12px">${mode}</div>
                <div class="type-opt-desc" style="font-size:10px">${{open:'Anyone can vote/propose',erc20:'ERC-20 token holders',nft:'NFT holders',custom:'Custom logic'}[mode]}</div>
              </button>`).join('')}
          </div>
          <div class="form-note" style="text-align:left">Clicking a mode proposes it — a second admin must approve within 24 hours before it takes effect.</div>
        </div>
      </div>

      <!-- WHITELIST CONTROLS -->
      <div class="admin-card">
        <div class="admin-card-header">
          <span class="admin-card-title">Whitelist settings</span>
        </div>
        <div class="admin-card-body">
          <div class="field-hint" style="margin-bottom:12px">Toggle whether whitelists are enforced, then manage individual addresses below.</div>
          <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
              <input type="checkbox" id="wl-vote" ${(_adminDraft.wlVote ?? cfg.use_whitelist_for_voting) ? 'checked' : ''} style="width:16px;height:16px;accent-color:var(--violet-500)">
              Voting whitelist active
            </label>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
              <input type="checkbox" id="wl-propose" ${(_adminDraft.wlPropose ?? cfg.use_whitelist_for_proposing) ? 'checked' : ''} style="width:16px;height:16px;accent-color:var(--violet-500)">
              Proposing whitelist active
            </label>
          </div>
          <button class="btn-secondary full-w" style="font-size:12px;margin-bottom:16px" onclick="handleToggleWhitelist($('wl-vote').checked,$('wl-propose').checked)">Save whitelist toggles</button>

          <div style="border-top:.5px solid var(--border);padding-top:14px">
            <div class="field-label mb-8">Add / update address</div>
            <input class="field-input" id="wl-addr" placeholder="0x… wallet address" value="${esc(_adminDraft.wlAddr||'')}" style="margin-bottom:6px">
            <div style="display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap">
              <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer"><input type="checkbox" id="wl-canvote" ${_adminDraft.wlCanVote!==false?'checked':''} style="accent-color:var(--violet-500)"> Can vote</label>
              <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer"><input type="checkbox" id="wl-canpropose" ${_adminDraft.wlCanPropose!==false?'checked':''} style="accent-color:var(--violet-500)"> Can propose</label>
            </div>
            <button class="btn-secondary full-w" style="font-size:12px" onclick="handleManageWhitelist($('wl-addr').value,$('wl-canvote').checked,$('wl-canpropose').checked)">Add / update address</button>
          </div>

          ${Object.keys(state.whitelist).length > 0 ? `
          <div style="margin-top:14px;padding-top:12px;border-top:.5px solid var(--border)">
            <div class="field-label mb-8">Whitelisted addresses (${Object.keys(state.whitelist).length})</div>
            ${Object.entries(state.whitelist).map(([addr, perms]) => `
              <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--border)">
                <span class="t-mono" style="flex:1;font-size:11px;color:var(--text-secondary)">${addr}</span>
                <span style="font-size:11px;color:var(--s-accepted-text)">${perms.can_vote&&perms.can_propose?'vote+propose':perms.can_vote?'vote':'propose'}</span>
                <button class="btn-secondary" style="font-size:10px;padding:2px 8px" onclick="handleRemoveFromWhitelist('${addr}')">Remove</button>
              </div>`).join('')}
          </div>` : '<div class="t-small" style="margin-top:12px;text-align:center;color:var(--text-tertiary)">No addresses whitelisted yet</div>'}
        </div>
      </div>

    </div>
  </div>`;
}

function renderDisputeForm() {
  const p = state.proposals.find(x=>x.id==state.detailId);
  if (!p) { navigate('proposals'); return ''; }
  const cfg = state.config||{};
  return `<div class="container" style="padding-top:20px;max-width:640px">
    <button class="back-link" onclick="navigate('detail',${p.id})">← Proposal #${p.id}</button>
    <h1 class="page-title" style="margin-bottom:4px;font-family:var(--font-display)">Raise a dispute</h1>
    <p class="t-small mb-16" style="margin-bottom:20px">Stage ${Number(p.dispute_count||0)+1} of maximum ${cfg.max_dispute_stages||3} · Triggers AI re-evaluation.</p>
    ${Number(p.dispute_count||0)>0?`<div class="mb-16"><div class="t-label mb-8">Previous stages</div>${disputeTimelineHtml(p.dispute_history)}</div>`:''}
    <div class="form-card">
      <div class="form-section">
        <label class="field-label" for="dispute-reason">Reason for dispute</label>
        <textarea class="field-input" id="dispute-reason" rows="5" placeholder="Explain why the AI audit decision should be reconsidered…"></textarea>
      </div>
      <div class="form-section">
        <button class="btn-primary full-w" onclick="handleSubmitDispute(${p.id},document.getElementById('dispute-reason').value)">Submit dispute →</button>
        <div class="form-note">Stage ${Number(p.dispute_count||0)+1} · ${Number(p.dispute_count||0)+1===1?'Re-evaluation of the original audit':'Independent AI panel review'}</div>
      </div>
    </div>
  </div>`;
}

      <h2 class="about-h2">Proposal statuses</h2>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
        ${[
          ['pending',                    'Voting is open — eligible addresses can cast votes'],
          ['needs_revision',             'AI returned revise — proposer must edit and resubmit'],
          ['accepted',                   'Proposal passed both AI audit and community vote'],
          ['rejected',                   'Failed vote, quorum, or AI audit — can be disputed'],
          ['under_review',               'Dispute in progress — AI panel deliberating'],
          ['pending_constitution_confirm','Constitution update passed — awaiting admin confirmation'],
          ['cancelled',                  'Cancelled by the proposer before finalization'],
        ].map(([status, desc]) => `
          <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:.5px solid var(--border)">
            ${badgeHtml(status)}
            <span style="font-size:13px;color:var(--text-secondary)">${desc}</span>
          </div>`).join('')}
      </div>

      <h2 class="about-h2">Technical notes</h2>
      <p class="about-p">GovLayer is built as a single Python intelligent contract on GenLayer, a blockchain that runs AI natively inside its virtual machine (GenVM). The AI audit uses <code style="font-family:var(--font-mono);font-size:12px;background:var(--surface-card);padding:1px 5px;border-radius:3px">gl.vm.run_nondet_unsafe</code> with a structural validator — multiple validator nodes must agree on the categorical decision (accept / revise / reject) before the result is committed to state.</p>
      <p class="about-p">Transactions on GenLayer Studionet typically take 1–4 minutes to finalize as validators reach consensus on the AI output. AI-heavy operations like proposal submission and dispute resolution can take 2–5 minutes.</p>
      <p class="about-p">The frontend is a single HTML file with no framework and no build step. It connects to the contract via the <a href="https://github.com/genlayerlabs/genlayer-js" target="_blank" class="about-link">genlayer-js SDK</a> loaded from esm.sh.</p>

      <h2 class="about-h2">Resources</h2>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
        ${[
          ['GenLayer Documentation', 'https://docs.genlayer.com'],
          ['GenLayer Studio', 'https://studio.genlayer.com'],
          ['genlayer-js SDK', 'https://github.com/genlayerlabs/genlayer-js'],
          ['Contract source', 'https://github.com/betheanalyst/govlayer/blob/main/contract/govlayer.py'],
        ].map(([label, href]) => `<a href="${href}" target="_blank" rel="noopener" style="padding:8px 14px;background:var(--surface-card);border:.5px solid var(--border);border-radius:7px;font-size:13px;color:var(--text-primary);transition:border-color var(--dur-fast);display:inline-flex;align-items:center;gap:5px" onmouseover="this.style.borderColor='var(--ink-300)'" onmouseout="this.style.borderColor='var(--border)'">${label} ↗</a>`).join('')}
      </div>

    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   MAIN RENDER — global error boundary
   ══════════════════════════════════════════════════════════ */
function render() {
  const body = $('page-body');
  if (!body) return;
  // Snapshot admin form values before DOM replacement — preserves user input across polling re-renders
  syncAdminDraftFromDOM();
  try {
    let html = '';
    switch (state.page) {
      case 'proposals':    html = renderProposalsFeed(); break;
      case 'detail':       html = renderProposalDetail(); break;
      case 'create':       html = renderCreateProposal(); break;
      case 'resubmit':     html = renderResubmit(); break;
      case 'constitution': html = renderConstitution(); break;
      case 'governance':   html = renderGovernance(); break;
      case 'admin':        html = renderAdmin(); break;
      case 'dispute-form': html = renderDisputeForm(); break;
      case 'about':        html = renderAbout(); break;
      default:             html = renderProposalsFeed();
    }
    body.innerHTML = html;
  } catch (err) {
    console.error('[GovLayer] Render error on page', state.page, err);
    body.innerHTML = `<div class="container" style="padding-top:48px;max-width:580px">
      <div class="empty-state">
        <div class="empty-icon">⚠</div>
        <div class="empty-title">Something went wrong</div>
        <div class="empty-sub" style="font-family:var(--font-mono);font-size:12px;color:var(--s-rejected-text);margin-bottom:16px">${esc(err.message)}</div>
        <button class="btn-primary" onclick="navigate('proposals')">Back to proposals</button>
      </div>
    </div>`;
  }
  updateWalletUI();
}

/* ══════════════════════════════════════════════════════════
   INIT — awaits SDK before starting data load
   ══════════════════════════════════════════════════════════ */
async function init() {
  // Show skeleton immediately
  render();

  // CRITICAL: wait for ESM SDK module to fully resolve before any contract calls
  try {
    await waitForSDK(15000);
  } catch (e) {
    state.loading.sdk = false;
    state.loading.proposals = false;
    state.loading.config = false;
    state.networkOk = false;
    showToast('SDK failed to load', e.message, 'error', 0);
    render();
    return;
  }
  state.loading.sdk = false;

  // Boot data from live contract (with auto-retry on network failure)
  await initData();

  // Start countdown timer display refresh (lightweight — no full re-render)
  setInterval(() => {
    document.querySelectorAll('.timer[data-end]').forEach(el => {
      const end = parseInt(el.dataset.end);
      if (isNaN(end)) return;
      const cd = formatCountdown(end);
      if (isVotingClosed(end)) {
        el.textContent = 'Closed'; el.classList.add('closed'); el.classList.remove('urgent');
      } else {
        el.textContent = `⏱ ${cd}`;
        if (isUrgent(end)) el.classList.add('urgent'); else el.classList.remove('urgent');
      }
    });
  }, 15000);
}

init();
</script>
